  }
  .rgc.draft .rgc-time,.rgc.draft .rgc-client{color:var(--accent-deep)}
  .rgc.draft .rgc-dur{background:color-mix(in srgb,var(--accent) 12%,#fff)}
  .rgc-main{padding:6px 10px}
  .rgc-row1{display:flex;align-items:center;justify-content:space-between;gap:6px}
  .rgc-time{font-size:10.5px;font-weight:800;color:var(--accent-deep);white-space:nowrap;letter-spacing:-.01em}
  .rgc-dur{flex-shrink:0;font-size:9px;font-weight:800;color:var(--accent-deep);background:rgba(255,255,255,.78);padding:1px 6px;border-radius:999px;white-space:nowrap}
  .rgc-row2{display:flex;align-items:center;gap:6px;margin-top:3px}
  .rgc-dot{flex-shrink:0;width:7px;height:7px;border-radius:50%}
  .rgc-dot.pub{background:#2f8a47;box-shadow:0 0 0 2px rgba(47,138,71,.22)}
  .rgc-dot.draft{background:#c9821a;box-shadow:0 0 0 2px rgba(201,130,26,.22)}
  .rgc-client{font-size:12px;font-weight:800;color:var(--accent-deep);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* tools — hidden until hover; labelled, colour-coded chips */
  .rgc-tools{
    display:flex;gap:5px;padding:0 9px;
    max-height:0;opacity:0;overflow:hidden;
    transition:max-height .2s ease, opacity .2s ease, padding .2s ease;
  }
  .rgc:hover{box-shadow:0 12px 26px color-mix(in srgb,var(--accent) 42%,transparent);transform:translateY(-2px);z-index:3}
  .rgc:hover .rgc-tools{max-height:34px;opacity:1;padding:0 8px 7px}
  .rgc-tool{
    flex:1;min-width:0;height:26px;border-radius:8px;border:none;cursor:pointer;
    display:grid;place-items:center;
    background:#fff;box-shadow:0 1px 3px rgba(20,40,22,.12);
    transition:transform .1s ease, background .12s ease, color .12s ease, box-shadow .12s ease;
  }
  .rgc-tool svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2}
  .rgc-tool:active{transform:scale(.9)}
  .rgc-tool:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(20,40,22,.2)}
  /* colour coding per action */
  .rgc-tool.t-assign{color:#2f6b8a}
  .rgc-tool.t-assign:hover{background:#2f6b8a;color:#fff}
  .rgc-tool.t-publish{color:#2f8a47}
  .rgc-tool.t-publish:hover{background:#2f8a47;color:#fff}
  .rgc-tool.t-add{color:#9a6a12}
  .rgc-tool.t-add:hover{background:#c9821a;color:#fff}
  .rgc-tool.t-del{color:#b0392c}
  .rgc-tool.t-del:hover{background:#b0392c;color:#fff}
}


/* ============================================================
   CLOCK IN / OUT — redesign (clk2)
   ============================================================ */
.clk2{max-width:520px;margin:14px auto 0;background:#fff;border:1px solid rgba(20,31,23,.07);
  border-radius:24px;padding:24px 20px;display:flex;flex-direction:column;align-items:center;
  box-shadow:0 6px 22px rgba(20,40,22,.08);position:relative;overflow:hidden}
.clk2.live{background:linear-gradient(180deg,#1f4e2e,#15391f);border:none}
.clk2.live::before{content:"";position:absolute;inset:0;background:radial-gradient(120% 60% at 50% 0%,rgba(95,191,118,.25),transparent 70%);pointer-events:none}

/* live banner */
.clk2-banner{position:relative;display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#bfe9c8;margin-bottom:16px}
.clk2-livedot{width:9px;height:9px;border-radius:50%;background:#5fbf76;box-shadow:0 0 0 4px rgba(95,191,118,.3);animation:clk2pulse 1.6s ease-in-out infinite}
@keyframes clk2pulse{0%,100%{box-shadow:0 0 0 3px rgba(95,191,118,.35)}50%{box-shadow:0 0 0 8px rgba(95,191,118,0)}}

/* timer ring */
.clk2-ring{position:relative;width:188px;height:188px;margin:4px 0 6px}
.clk2-ring-svg{width:100%;height:100%;transform:rotate(-90deg)}
.clk2-ring-bg{fill:none;stroke:rgba(255,255,255,.14);stroke-width:9}
.clk2-ring-fg{fill:none;stroke:#5fbf76;stroke-width:9;stroke-linecap:round;
  stroke-dasharray:389.6;stroke-dashoffset:292;transition:stroke-dashoffset 1s linear}
.clk2-ring-in{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.clk2-ring-in strong{font-size:34px;font-weight:800;color:#fff;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.clk2-ring-in span{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-top:2px}

/* live job */
.clk2-job{position:relative;text-align:center;margin-top:6px}
.clk2-job h2{font-family:var(--font-display,Georgia,serif);font-size:22px;font-weight:600;color:#fff;margin:0}
.clk2-job p{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:rgba(255,255,255,.8);margin:4px 0 0}
.clk2-job p svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}
.clk2-jobpill{display:inline-block;margin-top:9px;font-size:11.5px;font-weight:800;color:#fff;background:rgba(255,255,255,.16);padding:5px 13px;border-radius:999px}

/* idle clock face */
.clk2-clockface{position:relative;width:96px;height:96px;border-radius:50%;
  background:radial-gradient(circle at 50% 40%,#f3f7ef,#e7efe1);
  box-shadow:inset 0 2px 6px rgba(20,40,22,.1),0 4px 12px rgba(20,40,22,.08);margin-bottom:16px}
.clk2-clockface .clk2-hand{position:absolute;left:50%;bottom:50%;transform-origin:bottom center;border-radius:3px;background:#2f6b3e}
.clk2-clockface .h1{width:3px;height:30px;transform:translateX(-50%) rotate(35deg)}
.clk2-clockface .h2{width:3px;height:22px;transform:translateX(-50%) rotate(-70deg);background:#5fbf76}
.clk2-pin{position:absolute;left:50%;top:50%;width:9px;height:9px;border-radius:50%;background:#2f6b3e;transform:translate(-50%,-50%)}

/* greeting */
.clk2-greet{text-align:center}
.clk2-greet>span{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--clay-500,#a7673e)}
.clk2-greet h2{font-family:var(--font-display,Georgia,serif);font-size:23px;font-weight:600;color:var(--ink-900,#1a241c);margin:5px 0 4px}
.clk2-greet p{font-size:13.5px;color:var(--ink-500,#5d6b60);margin:0}

/* stats row */
.clk2-stats{display:flex;gap:10px;width:100%;margin:20px 0 4px}
.clk2-stat{flex:1;text-align:center;padding:11px 6px;border-radius:14px;background:rgba(255,255,255,.08)}
.clk2.idle .clk2-stat{background:var(--cream-100,#f3eee2)}
.clk2-stat strong{display:block;font-size:19px;font-weight:800;color:#fff;line-height:1}
.clk2.idle .clk2-stat strong{color:var(--ink-900,#1a241c)}
.clk2-stat em{display:block;font-style:normal;font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;margin-top:4px;color:rgba(255,255,255,.65)}
.clk2.idle .clk2-stat em{color:var(--ink-500,#5d6b60)}

/* action button */
.clk2-action{margin-top:16px;width:100%;height:52px;border:none;border-radius:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;font-size:15.5px;font-weight:800;
  transition:transform .1s ease, box-shadow .15s ease}
.clk2-action svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:2}
.clk2-action:active{transform:scale(.98)}
.clk2-action.stop{background:linear-gradient(150deg,#e8896f,#c4543a);color:#fff;box-shadow:0 6px 16px rgba(196,84,58,.4)}
.clk2-action.ghost{background:linear-gradient(150deg,#3f8a52,#2f6b3e);color:#fff;box-shadow:0 6px 16px rgba(47,107,62,.28)}

/* today's shifts */
.clk2-shifts-head{display:flex;align-items:center;gap:9px;max-width:520px;margin:24px auto 10px;padding:0 4px}
.clk2-shifts-head h3{font-family:var(--font-display,Georgia,serif);font-size:18px;font-weight:600;margin:0;color:var(--ink-900,#1a241c)}
.clk2-shifts-head span{min-width:22px;height:22px;padding:0 7px;border-radius:999px;background:var(--forest-700,#1d3d24);color:#fff;font-size:12px;font-weight:800;display:grid;place-items:center}
.clk2-shifts{max-width:520px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.clk2-sh{display:flex;background:#fff;border:1px solid rgba(20,31,23,.07);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(20,31,23,.05)}
.clk2-sh-rail{flex-shrink:0;width:6px;background:linear-gradient(180deg,var(--accent),var(--accent-deep))}
.clk2-sh-body{flex:1;min-width:0;padding:13px 14px}
.clk2-sh-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px}
.clk2-sh-time{font-size:13px;font-weight:800;color:var(--accent-deep)}
.clk2-sh-dur{font-size:10.5px;font-weight:800;color:var(--accent-deep);background:color-mix(in srgb,var(--accent) 16%,#fff);padding:2px 9px;border-radius:999px}
.clk2-sh-body h4{font-size:15px;font-weight:800;color:var(--ink-900,#1a241c);margin:0 0 3px}
.clk2-sh-loc{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-500,#5d6b60);margin-bottom:11px}
.clk2-sh-loc svg{width:13px;height:13px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2}
.clk2-sh-actions{display:flex;gap:8px}
.clk2-sh-actions button{flex:1;height:40px;border:none;border-radius:11px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-size:13.5px;font-weight:800;transition:transform .1s ease}
.clk2-sh-actions button:active{transform:scale(.97)}
.clk2-sh-actions button svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2}
.clk2-sh-start{background:linear-gradient(150deg,var(--accent),var(--accent-deep));color:#fff;box-shadow:0 4px 12px color-mix(in srgb,var(--accent) 40%,transparent)}
.clk2-sh-accept{background:linear-gradient(150deg,#3f8a52,#2f6b3e);color:#fff}
.clk2-sh-reject{flex:0 0 auto!important;padding:0 14px;background:#fbe4e0;color:#b0392c}
.clk2-sh-done{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;height:40px;border-radius:11px;background:#e3f0e4;color:#236b34;font-size:13.5px;font-weight:800}
.clk2-sh-declined{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;height:40px;border-radius:11px;background:#fbe4e0;color:#b0392c;font-size:13.5px;font-weight:800}

.clk2-sh.done{opacity:.7}
.clk2-sh.declined .clk2-sh-rail{background:#b0392c}

.clk2-empty{max-width:520px;margin:18px auto 0;text-align:center;padding:30px 20px;background:#fff;border-radius:18px;border:1px solid rgba(20,31,23,.07)}

.clk2-empty p{color:var(--ink-500,#5d6b60);margin:0 0 12px}

.rst-day.today{box-shadow:inset 0 0 0 1.5px rgba(45,107,62,.4)}
.rst-day.today .rd-dow{color:#2f6b3e}
.rst-day.sel{background:linear-gradient(170deg,#3f8a52,#2f6b3e);border-color:transparent;box-shadow:0 6px 14px rgba(47,107,62,.32)}
.rst-day.sel .rd-dow{color:rgba(255,255,255,.8)}
.rst-day.sel .rd-num{color:#fff}
.rst-day.sel .rd-cnt{background:rgba(255,255,255,.25)}
.rst-day.sel .rd-empty{background:rgba(255,255,255,.4)}

/* day head */
.rst-day-head{display:flex;align-items:baseline;gap:10px;margin:4px 2px 12px}
.rst-day-head h2{font-family:var(--font-display,Georgia,serif);font-size:20px;font-weight:600;margin:0;color:var(--ink-900,#1a241c)}
.rst-day-head span{font-size:12.5px;font-weight:700;color:var(--ink-500,#5d6b60)}

/* on desktop, admin uses the week grid below the shared hero */


/* ============================================================
   STICKY HEADER — premium redesign (tb2)
   ============================================================ */
.topbar.tb2{
  position:sticky;top:0;z-index:40;
  display:flex!important;align-items:center;gap:12px;
  padding:calc(14px + var(--safe-t)) 18px 14px!important;
  border:none!important;border-bottom:1px solid rgba(255,255,255,.08)!important;
  border-radius:0 0 24px 24px!important;
  box-shadow:0 10px 26px -14px rgba(8,23,12,.55)!important;
  overflow:hidden;
}
.topbar.tb2::after{opacity:.1!important}
.topbar.tb-admin{background:linear-gradient(125deg,var(--forest-700) 0%,var(--forest-800) 55%,var(--forest-950) 100%)!important}
.topbar.tb-staff{background:linear-gradient(125deg,var(--forest-600) 0%,var(--forest-800) 55%,var(--forest-950) 100%)!important}
.topbar.tb2::before{content:"";position:absolute;inset:0;
  background:radial-gradient(110% 90% at 88% -20%,rgba(149,173,146,.18),transparent 55%);pointer-events:none}

.tb2-left{display:flex;align-items:center;gap:11px;min-width:0;position:relative;flex:1}
.tb2-mark{flex-shrink:0;width:38px;height:38px;border-radius:12px;display:grid;place-items:center;
  font-size:12px;font-weight:800;letter-spacing:-.02em;color:#fff;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(6px)}
.tb-admin .tb2-mark{background:linear-gradient(150deg,var(--clay-500),var(--clay-700));border-color:rgba(255,255,255,.18)}
.tb-staff .tb2-mark{background:linear-gradient(150deg,var(--sage-500),var(--forest-600));border-color:rgba(255,255,255,.18)}
.tb2-titles{min-width:0}
.topbar.tb2 h1{
  font-family:var(--font-display,Georgia,serif)!important;font-weight:600!important;
  font-size:21px!important;letter-spacing:-.02em!important;line-height:1.05!important;
  color:var(--cream-50)!important;position:relative;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.topbar.tb2 .sub{
  font-size:12px!important;color:var(--sage-300)!important;font-weight:600!important;
  margin-top:2px!important;position:relative;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.topbar.tb2 .topbar-actions{margin-left:auto;display:flex;align-items:center;gap:9px;position:relative}

.tb2-bell{width:42px!important;height:42px!important;border-radius:13px!important;
  background:rgba(255,255,255,.12)!important;border:1px solid rgba(255,255,255,.16)!important;color:var(--cream-50)!important}
.tb2-bell svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2}
.tb2-bell .dot{position:absolute;top:9px;right:9px;width:9px;height:9px;border-radius:50%;
  background:var(--clay-500);border:2px solid var(--forest-800)}

.tb2-profile{padding:0!important;border:none!important;background:none!important}
.tb2-profile .avatar{width:42px!important;height:42px!important;border-radius:13px!important;
  border:2px solid rgba(255,255,255,.3)!important;font-size:13px!important;font-weight:800!important;
  box-shadow:0 2px 8px rgba(0,0,0,.25)!important}
.tb2-profile:active{transform:scale(.95)}

@media(min-width:1024px){
  .topbar.tb2{border-radius:0!important;padding:20px 32px!important}
  .topbar.tb2 h1{font-size:24px!important}
  .tb2-mark{display:none}
}


/* single Availability card on admin home */
.hm-avail{display:flex;align-items:center;gap:10px;width:100%;text-align:left;cursor:pointer;
  background:#fff;border:1px solid rgba(20,31,23,.07);border-radius:12px;padding:8px 12px;
  box-shadow:0 1px 6px rgba(20,31,23,.05);transition:transform .12s ease, box-shadow .12s ease}
.hm-avail:active{transform:scale(.99)}
@media(hover:hover){.hm-avail:hover{box-shadow:0 5px 13px rgba(20,31,23,.1)}}
.hm-avail-ic{flex-shrink:0;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:#fff;
  background:linear-gradient(150deg,var(--clay-400,#cf8a64),var(--clay-600,#a35a35))}
.hm-avail-ic svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2}
.hm-avail-txt{flex:1;min-width:0;display:flex;flex-direction:column;gap:0}
.hm-avail-txt strong{font-size:13px;font-weight:800;color:var(--ink-900,#1a241c)}
.hm-avail-txt span{font-size:11px;color:var(--ink-500,#5d6b60)}
.hm-avail-go{flex-shrink:0;color:#c2cabd;transform:rotate(180deg)}
.hm-avail-go svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2.4}


/* ============================================================
   ADD-SHIFT — employee search bar + dropdown
   ============================================================ */
.emp-field{display:flex;flex-direction:column;gap:7px}
.shift-section-label{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:var(--forest-700,#1d3d24)}
.shift-section-label svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2}

.emp-searchbar{display:flex;align-items:center;gap:9px;width:100%;cursor:pointer;text-align:left;
  background:#fff;border:1.5px solid rgba(20,31,23,.14);border-radius:13px;padding:12px 14px;
  transition:border-color .12s ease, box-shadow .12s ease}
.emp-searchbar:hover{border-color:rgba(45,107,62,.4)}
.emp-searchbar > svg{flex-shrink:0;width:17px;height:17px;fill:none;stroke:#8a958b;stroke-width:2}
.emp-searchbar-txt{flex:1;min-width:0;font-size:14px;color:#9aa49a;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emp-searchbar-txt.has{color:var(--ink-900,#1a241c);font-weight:700}
.emp-searchbar-chev{flex-shrink:0;color:#9aa49a;transform:rotate(-90deg);transition:transform .2s ease}
.emp-searchbar-chev.open{transform:rotate(90deg)}
.emp-searchbar-chev svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2.4}

.emp-dropdown{border:1.5px solid rgba(45,107,62,.25);border-radius:14px;overflow:hidden;background:#fff;
  box-shadow:0 8px 24px rgba(20,40,22,.12);animation:empSlide .16s ease}
@keyframes empSlide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.emp-dd-search{display:flex;align-items:center;gap:8px;padding:11px 13px;border-bottom:1px solid rgba(20,31,23,.07);background:var(--cream-50,#fbf8f1)}
.emp-dd-search svg{flex-shrink:0;width:16px;height:16px;fill:none;stroke:#8a958b;stroke-width:2}
.emp-dd-search input{flex:1;border:none;outline:none;background:none;font-size:14px;font-weight:600;color:var(--ink-900,#1a241c)}
.emp-dd-search input::placeholder{color:#a7b0a6}
.emp-dropdown .employee-picker{max-height:260px;overflow-y:auto;padding:6px}
.emp-dd-foot{display:flex;gap:8px;padding:10px 12px;border-top:1px solid rgba(20,31,23,.07);background:var(--cream-50,#fbf8f1)}
.emp-dd-btn{flex:1;height:42px;border:none;border-radius:12px;cursor:pointer;font-size:14px;font-weight:800;transition:transform .1s ease}
.emp-dd-btn:active{transform:scale(.97)}
.emp-dd-btn.clear{background:#fff;color:var(--ink-500,#5d6b60);box-shadow:inset 0 0 0 1.5px rgba(20,31,23,.14)}
.emp-dd-btn.done{background:linear-gradient(150deg,#3f8a52,#2f6b3e);color:#fff;box-shadow:0 4px 12px rgba(47,107,62,.3)}


/* add-client inline form */
.add-client-block{margin-top:10px}
.add-client-toggle{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;cursor:pointer;
  background:var(--cream-50,#fbf8f1);border:1.5px dashed rgba(45,107,62,.3);border-radius:13px;padding:11px 14px;
  font-size:13.5px;font-weight:800;color:var(--forest-700,#1d3d24)}
.add-client-toggle > span:first-child{display:inline-flex;align-items:center;gap:7px}
.add-client-toggle svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2}
.ac-chev{color:var(--forest-500,#4a7351);transform:rotate(-90deg);transition:transform .2s ease}
.ac-chev.open{transform:rotate(90deg)}
.add-client-form{margin-top:10px;border:1.5px solid rgba(45,107,62,.22);border-radius:14px;padding:14px;background:#fff;
  box-shadow:0 6px 18px rgba(20,40,22,.1);animation:empSlide .16s ease;display:flex;flex-direction:column;gap:11px}
.add-client-foot{display:flex;gap:8px;margin-top:2px}


/* ensure header is sticky on desktop across all pages */
@media(min-width:1024px){
  /* Lock the shell to the viewport; scroll happens INSIDE .main. */
  html,body{height:100%!important;overflow:hidden!important}
  #app{height:100dvh!important;overflow:hidden!important}
  .shell{height:100dvh!important;overflow:hidden!important;align-items:stretch}
  .sidebar{height:100dvh!important;flex:0 0 var(--sidebar-w);position:relative;top:auto}
  /* .main is the scroll container */
  .main{height:100dvh!important;overflow-y:auto!important;overflow-x:hidden!important;min-height:0!important}
  /* header sticks to the top of the scrolling .main */
  .topbar{
    position:sticky!important;top:0!important;z-index:120!important;
    transform:none!important;-webkit-transform:none!important;flex:0 0 auto;
  }
  .content{padding-top:24px!important}
  .rwg-wrap{max-height:calc(100dvh - 230px)!important}
  /* modal scroll-lock */
  body.modal-open{overflow:hidden!important}
}


/* ============================================================
   DESKTOP FULL-WIDTH LAYOUTS (≥1024px)
   Use the whole screen; remove narrow centered columns.
   ============================================================ */
@media(min-width:1024px){
  .content{max-width:none!important;width:auto!important;margin:0!important;
    padding:26px clamp(24px,3vw,44px) 48px!important}

  /* ---- HOME: two-column dashboard ---- */
  .hm{max-width:none!important;
    display:grid!important;grid-template-columns:1.55fr 1fr;gap:18px;align-items:start}
  /* hero spans both columns */
  .hm-hero{grid-column:1 / -1}
  /* approvals + updates on the left, availability + roster flow naturally */
  .approvals-panel{grid-column:1 / -1}
  .hm > .updates-panel{grid-column:1}
  .hm-avail{grid-column:2;align-self:start}
  .hm-sec-head{grid-column:1 / -1}
  .home-roster-list{grid-column:1 / -1;
    display:grid!important;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:12px}
  /* employee next-shift card sits beside updates */
  .hm-next{grid-column:2;align-self:start}

  /* ---- ROSTER: full width grid ---- */
  .rst-hero{max-width:none!important}
  .rwg-wrap{max-width:none!important}
  .rwg-grid{min-width:0!important;width:100%}

  /* ---- MESSAGES: full-height two-pane that fills the screen ---- */
  .chat-shell{height:calc(100dvh - 150px)!important;max-width:none!important;width:100%!important;gap:18px!important}
  .chat-list{width:340px!important;flex:0 0 340px!important}
  .chat-thread{flex:1!important;min-width:0!important;display:flex!important;flex-direction:column!important}
  .chat-scroll{flex:1!important;min-height:0!important}
  .bubble{max-width:min(70%,640px)!important}

  /* ---- PROFILE: clean wider single column, centered ---- */
  .pf2{max-width:920px!important;margin:0 auto!important}
  .pf2-links{display:grid!important;grid-template-columns:repeat(3,1fr);gap:10px}
  .pf2-card .pf2-row{padding:15px 18px}
}
@media(min-width:1500px){
  .content{padding-left:clamp(28px,4vw,72px)!important;padding-right:clamp(28px,4vw,72px)!important}
}


/* ============================================================
   TIMESHEET — full-screen single-employee focus view (tsf)
   ============================================================ */
.tsf{display:flex;flex-direction:column;gap:14px}
.tsf-bar{display:flex;align-items:center;justify-content:space-between;gap:12px}
.tsf-back{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid rgba(20,31,23,.1);border-radius:999px;padding:9px 15px;font-size:13px;font-weight:800;color:var(--forest-700,#1d3d24);cursor:pointer;box-shadow:0 2px 7px rgba(20,31,23,.06)}
.tsf-back svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2.2}
.tsf-back:active{transform:scale(.97)}
.tsf-nav{display:flex;align-items:center;gap:8px}
.tsf-nav-count{font-size:12px;font-weight:800;color:#fff;background:var(--forest-700,#1d3d24);border-radius:999px;padding:5px 11px;min-width:46px;text-align:center}
.tsf-nav-btn{display:inline-flex;align-items:center;gap:9px;background:#fff;border:1.5px solid rgba(45,107,62,.22);border-radius:14px;padding:7px 12px;font-weight:800;color:var(--forest-700,#1d3d24);cursor:pointer;box-shadow:0 3px 12px rgba(20,40,22,.1);transition:transform .1s ease,box-shadow .12s ease,border-color .12s ease}
.tsf-nav-btn:hover{border-color:var(--forest-500,#4a7351);box-shadow:0 6px 18px rgba(20,40,22,.16);transform:translateY(-1px)}
.tsf-nav-btn:active{transform:scale(.97)}
.tsf-nav-btn svg{width:16px;height:16px;fill:none;stroke:var(--forest-500,#4a7351);stroke-width:2.4}
.tsf-nav-av{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-size:12px;font-weight:800;color:#fff;background:linear-gradient(150deg,var(--forest-500),var(--forest-700));box-shadow:0 2px 6px rgba(20,40,22,.25)}
.tsf-nav-lbl{display:flex;flex-direction:column;line-height:1.05;text-align:left}
.tsf-nav-lbl.right{text-align:right}
.tsf-nav-lbl em{font-style:normal;font-size:8.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--clay-600,#a35a35)}
.tsf-nav-lbl strong{font-size:14px;font-weight:800;color:var(--ink-900,#1a241c);max-width:96px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.tsf-nav-btn:active{transform:scale(.97)}
.tsf-head{display:grid;grid-template-columns:auto 1fr;align-items:center;gap:13px 16px;background:linear-gradient(140deg,var(--forest-600),var(--forest-900));color:#fff;border-radius:20px;padding:18px;box-shadow:0 8px 24px rgba(20,40,22,.18)}
.tsf-av{flex-shrink:0;width:56px;height:56px;border-radius:16px;font-size:19px;font-weight:800;background:rgba(255,255,255,.16)!important;color:#fff!important;border:2px solid rgba(255,255,255,.3);display:grid;place-items:center}
.tsf-head-copy{flex:1;min-width:0}
.tsf-head-copy h2{font-family:var(--font-display,Georgia,serif);font-size:21px;font-weight:600;margin:0;color:#fff;line-height:1.1}
.tsf-head-copy span{display:block;font-size:12.5px;color:rgba(255,255,255,.8);margin-top:3px;line-height:1.35}
.tsf-head-stats{grid-column:1 / -1;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:2px}
.tsf-hs{background:rgba(255,255,255,.12);border-radius:13px;padding:9px 6px;text-align:center;min-width:0}
.tsf-hs em{display:block;font-style:normal;font-size:9px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:rgba(255,255,255,.7);white-space:nowrap}
.tsf-hs strong{display:block;font-size:15px;font-weight:800;margin-top:2px;white-space:nowrap}
.tsf-hs.warn{background:rgba(232,137,111,.4)}
.tsf-period{font-size:13px;font-weight:700;color:var(--ink-500,#5d6b60);margin:-2px 2px 0}
.tsf-rows{display:flex;flex-direction:column;gap:5px}
.tsf-row{display:flex;align-items:stretch;background:#fff;border:1px solid rgba(20,31,23,.08);border-radius:10px;overflow:hidden}
.tsf-row.today{box-shadow:inset 0 0 0 1.5px rgba(45,107,62,.4)}
.tsf-row-day{flex-shrink:0;width:62px;display:flex;flex-direction:column;justify-content:center;gap:0;padding:6px 8px;background:linear-gradient(160deg,var(--forest-600),var(--forest-800));color:#fff}
.tsf-row.today .tsf-row-day{background:linear-gradient(160deg,var(--forest-500),var(--forest-700))}
.tsf-rd-dow{font-size:9px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.78)}
.tsf-rd-num{font-size:16px;font-weight:800;line-height:1}
.tsf-rd-mon{display:none}
.tsf-rd-sum{margin-top:2px;font-size:7.5px;font-weight:800;color:rgba(255,255,255,.85)}
.tsf-row-entries{flex:1;min-width:0;display:flex;flex-direction:column}
.tsf-row-empty{display:flex;align-items:center;font-size:11px;font-weight:600;color:#bcc4b6;padding:8px 12px}
.tsf-row-add{align-self:flex-start;margin:4px 0 5px 12px;height:24px;padding:0 10px;border-radius:7px;border:1px dashed rgba(45,107,62,.3);background:transparent;color:var(--forest-500,#4a7351);cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800}
.tsf-row-add svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.2}
.tsf-row-add:active{transform:scale(.96)}

/* table-style timesheet entry */
.tfe{display:flex;align-items:center;gap:10px;padding:7px 12px;border-bottom:1px solid rgba(20,31,23,.06);cursor:pointer;transition:background .12s ease}
.tfe:last-of-type{border-bottom:none}
.tfe:hover{background:var(--cream-50,#fbf8f1)}
.tfe-dot{flex-shrink:0;width:8px;height:8px;border-radius:50%}
.tfe-dot.pending{background:#c9821a}.tfe-dot.approved{background:#2f8a47}.tfe-dot.paid{background:#3a6fb0}.tfe-dot.flagged{background:#b0392c}
.tfe-client{flex:0 0 150px;font-size:12.5px;font-weight:800;color:var(--ink-900,#1a241c);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tfe-time{flex:0 0 96px;font-size:11.5px;font-weight:700;color:var(--forest-700,#1d3d24)}
.tfe-h{flex:0 0 44px;font-size:11.5px;font-weight:800;color:var(--ink-800,#2a3a2c)}
.tfe-km{flex:0 0 44px;font-size:11px;font-weight:800;color:#8a5326}
.tfe-note{flex:1;min-width:0;font-size:11.5px;color:var(--ink-600,#4a5a4c);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tfe-note em{color:#c2cabd}
.tfe-status{flex-shrink:0;font-size:8px;padding:2px 7px}
.tfe-actions{flex-shrink:0;display:flex;gap:4px}
.tfe-ic{width:26px;height:26px;border-radius:7px;border:none;cursor:pointer;display:grid;place-items:center;background:rgba(20,31,23,.06);color:var(--forest-700,#1d3d24)}
.tfe-ic svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}
.tfe-ic.flag{background:#fbe4e0;color:#b0392c}
.tfe-ic.ok{background:#2f6b3e;color:#fff}
.tfe-ic:active{transform:scale(.9)}
@media(max-width:1100px){.tfe-status{display:none}}
@media(max-width:900px){.tfe-note{flex-basis:100%;order:5;white-space:normal}.tfe-client{flex-basis:120px}}


/* timesheet focus — search + results */
.tsf-search{flex:1;max-width:300px;display:flex;align-items:center;gap:7px;background:#fff;border:1px solid rgba(20,31,23,.12);border-radius:999px;padding:7px 14px}
.tsf-search svg{width:15px;height:15px;fill:none;stroke:#8a958b;stroke-width:2;flex-shrink:0}
.tsf-search input{flex:1;border:none;outline:none;background:none;font-size:13px;font-weight:600;color:var(--ink-900,#1a241c)}
.tsf-search input::placeholder{color:#a7b0a6}
.tsf-results{display:flex;flex-wrap:wrap;gap:7px;background:#fff;border:1px solid rgba(20,31,23,.08);border-radius:13px;padding:10px;box-shadow:0 6px 18px rgba(20,40,22,.1)}
.tsf-result{display:inline-flex;align-items:center;gap:7px;background:var(--cream-50,#fbf8f1);border:1px solid rgba(20,31,23,.08);border-radius:999px;padding:5px 13px 5px 5px;font-size:12.5px;font-weight:800;color:var(--ink-900,#1a241c);cursor:pointer}

.tsf-result .avatar{width:26px;height:26px;font-size:10px}
.tsf-noresult{font-size:12.5px;color:var(--ink-500,#5d6b60);padding:4px 8px}


/* ============================================================
   EMPLOYEE ROSTER CARD — premium (rc2)
   ============================================================ */
.rc2{position:relative;overflow:hidden;background:#fff;border:1px solid rgba(20,31,23,.07);
  border-radius:20px;padding:14px 14px 12px 0;margin-bottom:12px;
  box-shadow:0 4px 16px rgba(20,40,22,.07)}

/* ============================================================
   PERFORMANCE & SMOOTHNESS
   ============================================================ */
*{
  -webkit-tap-highlight-color:transparent;   /* no grey flash on tap */
}
html{
  scroll-behavior:smooth;
  text-rendering:optimizeLegibility;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
body{
  overscroll-behavior-y:none;                  /* stop rubber-band jank */
}
.content,.modal-body,.chat-scroll,.page,#page{
  -webkit-overflow-scrolling:touch;            /* momentum scroll on iOS */
  overscroll-behavior:contain;
}
/* snappy, consistent press feedback on all tappable elements */
button,.btn,[data-action],a{
  -webkit-touch-callout:none;
  transition:transform .12s ease, opacity .12s ease, background-color .16s ease, box-shadow .16s ease;
}
button:active,.btn:active,[data-action]:active{transform:scale(.97)}
/* keep already-styled controls from double-shrinking */
.dock-tab:active,.ndial-stop:active,.sft-save:active,.sft-cancel:active{transform:scale(.97)}

/* promote only genuinely-animated layers to GPU to avoid repaint jank */
.modal,.modal-overlay,.dock,.ndial-prog{
  will-change:transform;
  transform:translateZ(0);
}

/* respect users who prefer less motion */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;transition-duration:.05ms!important}
  html{scroll-behavior:auto}
}

/* bold round badge — sleek glass ring */
.rc-badge{
  position:relative !important;

.rc-info{flex:1 !important;min-width:0 !important;display:flex !important;flex-direction:column !important;gap:3px !important}

  letter-spacing:-.01em !important;line-height:1.2 !important;margin:0 0 1px !important;white-space:nowrap !important;overflow:hidden !important;text-overflow:ellipsis !important;
  display:inline-block !important;align-self:flex-start !important;max-width:100% !important;
  padding:3px 12px !important;border-radius:999px !important;

.rc-meta{font-size:12px !important;font-weight:700 !important;color:#fff !important;line-height:1.3 !important;min-width:0 !important;white-space:nowrap !important;overflow:hidden !important;text-overflow:ellipsis !important;text-shadow:0 1px 3px rgba(0,0,0,.5) !important;opacity:.96 !important}
.rc-status{

/* actions inline on the right */

<script>
/* Block pinch-zoom and double-tap-zoom (iOS ignores user-scalable in PWAs) */
(function(){
  // pinch (multi-touch) zoom
  document.addEventListener('touchmove',function(e){
    if(e.touches&&e.touches.length>1){e.preventDefault();}
  },{passive:false});
  document.addEventListener('gesturestart',function(e){e.preventDefault();},{passive:false});
  document.addEventListener('gesturechange',function(e){e.preventDefault();},{passive:false});
  // double-tap zoom
  var lastTouch=0;
  document.addEventListener('touchend',function(e){
    var now=Date.now();
    if(now-lastTouch<=300){
      var t=e.target;
      // don't block interactions on inputs/controls
      if(!/^(INPUT|TEXTAREA|SELECT|BUTTON)$/.test(t.tagName)&&!t.closest('button,a,input,textarea,select,[data-action]')){
        e.preventDefault();
      }
    }
    lastTouch=now;
  },{passive:false});
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  var __wwReloaded = false;
  // When the active SW changes (new deploy took over), reload once to get fresh CSS.
  navigator.serviceWorker.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'ww-updated' && !__wwReloaded) {
      __wwReloaded = true; location.reload();
    }
  });
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/sw.js').then(function (reg) {
      // Check for a new version every time the app opens / regains focus.
      try { reg.update(); } catch (e) {}
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') { try { reg.update(); } catch (e) {} }
      });
      reg.addEventListener('updatefound', function () {
        var nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', function () {
          if (nw.state === 'installed' && navigator.serviceWorker.controller && !__wwReloaded) {
            __wwReloaded = true; location.reload();
