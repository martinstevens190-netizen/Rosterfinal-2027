.cl-head h2{font-family:var(--font-display);font-size:21px;font-weight:500;flex:1;letter-spacing:-.018em}
.cl-new{
  width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
  background:linear-gradient(140deg,var(--forest-600),var(--forest-800));
  color:#fff;box-shadow:var(--shadow-sm),inset 0 1px 0 rgba(255,255,255,.15);
}
.cl-new:hover{box-shadow:var(--shadow-md),inset 0 1px 0 rgba(255,255,255,.18)}
.cl-new svg{width:18px;height:18px}
.cl-threads{flex:1;overflow-y:auto;overscroll-behavior:contain;padding:6px}
.ct-row{
  display:flex;align-items:center;gap:10px;width:100%;
  padding:8px 11px;border-radius:12px;text-align:left;
  transition:background var(--t-fast);
}
.ct-row:hover{background:var(--cream-100)}
.ct-row.active{background:var(--sage-100)}
.ct-row .avatar{width:36px;height:36px}
.ct-row .avatar svg{width:17px;height:17px}
.ct-body{flex:1;min-width:0}
.ct-top{display:flex;align-items:baseline;gap:8px}
.ct-name{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;color:var(--ink-900);letter-spacing:-.005em}
.ct-top time{font-size:10.5px;color:var(--ink-400);flex-shrink:0;font-weight:600}
.ct-last{font-size:12px;color:var(--ink-500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

.chat-thread{
  flex:1;min-width:0;
  background:var(--paper);border:1px solid var(--line);
  border-radius:18px;box-shadow:var(--shadow-sm);
  display:flex;flex-direction:column;overflow:hidden;
}
.chat-thread-head{
  display:flex;align-items:center;gap:11px;
  padding:14px 16px;border-bottom:1px solid var(--line);
  background:var(--cream-50);
}
.cth-back{display:none;width:34px;height:34px;border-radius:10px;place-items:center;color:var(--forest-700);background:var(--cream-100);flex-shrink:0}
.cth-back svg{width:18px;height:18px}
.chat-thread-head .avatar{width:40px;height:40px}
.chat-thread-head .avatar svg{width:18px;height:18px}
.cth-info{flex:1;min-width:0}
.cth-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.005em}
.cth-sub{font-size:11.5px;color:var(--ink-500);margin-top:1px}
.cth-act{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:var(--cream-100);color:var(--forest-700);flex-shrink:0}
.cth-act svg{width:18px;height:18px}

.chat-scroll{
  flex:1;overflow-y:auto;
  padding:18px;display:flex;flex-direction:column;gap:9px;
  overscroll-behavior:contain;
  background:linear-gradient(180deg,var(--cream-50),var(--paper));
}
.thread-empty,.empty-thread{text-align:center;color:var(--ink-400);font-size:14px;margin:auto;padding:40px}
.msg{display:flex;gap:8px;align-items:flex-end;max-width:78%}
.msg.mine{margin-left:auto;flex-direction:row-reverse}
.msg-av{width:28px;flex-shrink:0}
.bubble{
  background:#fff;border-radius:18px 18px 18px 5px;
  padding:10px 14px;border:1px solid var(--line);
  box-shadow:var(--shadow-xs);
}
.msg.mine .bubble{
  background:linear-gradient(150deg,var(--forest-600),var(--forest-700));
  border-color:transparent;color:#fff;
  border-radius:18px 18px 5px 18px;
  box-shadow:0 2px 8px rgba(30,55,30,.18);
}
.b-author{font-size:11.5px;font-weight:800;color:var(--clay-600);margin-bottom:3px;letter-spacing:.005em}
.b-text{font-size:14px;line-height:1.5;letter-spacing:-.005em}
.bubble time{font-size:10px;color:var(--ink-400);display:block;margin-top:3px;text-align:right}
.msg.mine time{color:rgba(255,255,255,.6)}
.chat-composer{display:flex;gap:9px;padding:13px;border-top:1px solid var(--line);background:var(--cream-50)}
.chat-composer .input{border-radius:23px;background:#fff}
.chat-composer textarea.input{height:46px;min-height:46px}
.csend{
  width:46px;height:46px;padding:0;flex-shrink:0;border-radius:50%;
  background:linear-gradient(140deg,var(--forest-600),var(--forest-800));
  color:#fff;box-shadow:0 4px 12px rgba(30,55,25,.22),inset 0 1px 0 rgba(255,255,255,.15);
}
.chat-readonly{padding:16px;text-align:center;font-size:13px;color:var(--ink-500);border-top:1px solid var(--line);background:var(--cream-50);font-weight:600}

@media(max-width:1023px){
  .chat-shell .chat-thread{display:none}
  .chat-shell.show-thread .chat-list{display:none}
  .chat-shell.show-thread .chat-thread{display:flex}
  .chat-list{width:100%}
  .cth-back{display:grid}
}

.nc-opt{
  display:flex;align-items:center;gap:13px;width:100%;
  padding:15px;border:1px solid var(--line);border-radius:14px;
  margin-bottom:10px;text-align:left;
  transition:background var(--t-fast),border-color var(--t-fast);
}
.nc-opt:hover{background:var(--cream-50);border-color:var(--line-strong)}
.nc-opt>svg:first-child{width:24px;height:24px;color:var(--forest-600);flex-shrink:0}
.nc-opt div{flex:1}
.nc-opt strong{display:block;font-size:14.5px;letter-spacing:-.005em}
.nc-opt span{font-size:12px;color:var(--ink-500)}
.nc-opt>svg:last-child{width:18px;height:18px;color:var(--ink-400);transform:rotate(180deg)}
.dm-list{display:flex;flex-direction:column;gap:6px;max-height:50vh;overflow-y:auto}
.dm-pick{display:flex;align-items:center;gap:12px;padding:10px;border-radius:13px;text-align:left;transition:background var(--t-fast)}
.dm-pick:hover{background:var(--cream-100)}
.dmp-name{font-size:14.5px;font-weight:700;letter-spacing:-.005em}
.dmp-sub{font-size:12px;color:var(--ink-500)}
.member-pick{display:flex;flex-wrap:wrap;gap:8px}
.mp-chip{
  display:flex;align-items:center;gap:7px;padding:6px 12px 6px 6px;
  border-radius:22px;border:1.5px solid var(--line);
  font-size:13px;font-weight:700;color:var(--ink-700);
  transition:all var(--t-fast);
}
.mp-chip .avatar{width:26px;height:26px}
.mp-chip.on{background:var(--forest-600);border-color:transparent;color:#fff}


/* ──────────────────────────────────────────────────────────
   11. PEOPLE / CLIENTS / DOCUMENTS
   ────────────────────────────────────────────────────────── */
.people-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
@media(max-width:860px){.people-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.people-grid{grid-template-columns:1fr}}
.person-card{
  padding:22px 18px;text-align:center;cursor:pointer;
  transition:box-shadow var(--t-fast),transform .1s,border-color var(--t-fast);
}
.person-card.client{cursor:default}
.person-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);border-color:var(--line-strong)}
.person-card .avatar.lg{margin:0 auto 12px}
.person-card h3{font-size:16px;font-weight:700;letter-spacing:-.01em}
.pc-title{font-size:12.5px;color:var(--ink-500);margin-top:2px}
.pc-stats{display:flex;justify-content:center;gap:6px;margin:11px 0;flex-wrap:wrap}
.pc-stats span{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;font-weight:700;color:var(--forest-700);
  background:var(--sage-100);border:1px solid rgba(74,115,81,.14);
  padding:5px 11px;border-radius:9px;
}
.pc-stats svg{width:13px;height:13px}
.pc-meta{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--ink-500);margin-top:5px}
.pc-meta svg{width:13px;height:13px;opacity:.7}

/* Documents */
.doc-row{display:flex;align-items:center;gap:13px;padding:13px 18px;border-bottom:1px solid var(--line)}
.doc-row:last-child{border-bottom:0}
.doc-row.sm{padding:9px 0;border:0}
.doc-ic{width:40px;height:40px;border-radius:11px;flex-shrink:0;display:grid;place-items:center;background:var(--cream-200);color:var(--ink-500)}
.doc-ic.green{background:var(--sage-100);color:var(--forest-600)}
.doc-ic.amber{background:var(--clay-100);color:var(--clay-700)}
.doc-ic.grey{background:var(--cream-200);color:var(--ink-500)}
.doc-ic svg{width:19px;height:19px}
.doc-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.005em}
.doc-sub{font-size:12px;color:var(--ink-500);margin-top:1px}
.doc-row .pill{margin-left:auto}

.doc-intro{display:flex;align-items:center;gap:14px}
.doc-intro .di-ic{
  width:48px;height:48px;border-radius:14px;flex-shrink:0;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--sage-100),var(--sage-200));
  color:var(--forest-600);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.5);
}
.doc-intro .di-ic svg{width:22px;height:22px}
.doc-intro h3{font-family:var(--font-display);font-size:19px;font-weight:500;letter-spacing:-.018em}
.doc-intro p{font-size:12.5px;color:var(--ink-500);margin-top:3px;line-height:1.45}
.doc-intro .btn{flex-shrink:0;margin-left:auto}
@media(max-width:560px){.doc-intro{flex-wrap:wrap}.doc-intro .btn{margin-left:0;width:100%}}

.doc-card{
  display:flex;align-items:center;gap:12px;
  background:var(--paper);border:1px solid var(--line);
  border-radius:14px;padding:13px 14px;
  box-shadow:var(--shadow-xs);margin-bottom:9px;cursor:pointer;
  transition:box-shadow var(--t-fast),transform .1s;
}
.doc-card:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px)}
.doc-card.need{border-color:var(--clay-300);background:linear-gradient(135deg,#fdf6ed,var(--paper))}
.dc-body{flex:1;min-width:0}
.doc-card .pill{flex-shrink:0}
.dc-del{flex-shrink:0;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:transparent;color:var(--ink-400);transition:all var(--t-fast)}
.dc-del:hover{background:#fbeae8;color:var(--status-bad)}
.dc-del svg{width:15px;height:15px}

.folder-card{
  display:flex;align-items:center;gap:13px;
  background:var(--paper);border:1px solid var(--line);
  border-radius:15px;padding:15px;
  box-shadow:var(--shadow-xs);margin-bottom:9px;cursor:pointer;
  transition:box-shadow var(--t-fast),transform .1s;
}
.folder-card:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px)}
.fc-body{flex:1;min-width:0}
.fc-name{font-size:15px;font-weight:700;letter-spacing:-.005em}
.fc-sub{font-size:12px;color:var(--ink-500);margin-top:2px}
.fc-arrow{transform:rotate(180deg);color:var(--ink-400);flex-shrink:0}
.fc-arrow svg{width:18px;height:18px;display:block}
.folder-card .pill svg{width:13px;height:13px}

.doc-drop{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;
  padding:28px;border:2px dashed var(--line-strong);border-radius:14px;
  cursor:pointer;color:var(--ink-500);
  transition:border-color var(--t-fast),background var(--t-fast);
  margin-bottom:6px;background:var(--cream-50);
}
.doc-drop:hover{border-color:var(--forest-500);background:var(--sage-50);color:var(--forest-700)}
.doc-drop svg{width:28px;height:28px;color:var(--forest-500)}
.doc-drop span{font-size:13px;font-weight:600}


/* ──────────────────────────────────────────────────────────
   12. ACCOUNT / PROFILE / DETAILS
   ────────────────────────────────────────────────────────── */
.account-hero{display:flex;align-items:center;gap:18px}
.ah-title{font-size:13.5px;color:var(--ink-500);margin-top:3px;letter-spacing:.005em}
.detail-list{padding:6px 0}
.detail-row{display:flex;align-items:center;gap:13px;padding:14px 18px;border-bottom:1px solid var(--line)}
.detail-row:last-child{border-bottom:0}
.dr-ic{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,var(--sage-100),var(--sage-200));
  color:var(--forest-600);display:grid;place-items:center;flex-shrink:0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.4);
}
.dr-ic svg{width:18px;height:18px}
.dr-l{font-size:10.5px;font-weight:800;color:var(--ink-400);text-transform:uppercase;letter-spacing:.08em}
.dr-v{font-size:14.5px;font-weight:600;color:var(--ink-900);margin-top:2px;letter-spacing:-.005em}

.profile-modules{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
.profile-modules.compact{grid-template-columns:repeat(3,1fr);margin:12px 0}
.profile-mini{padding:16px;min-height:96px;display:flex;flex-direction:column;justify-content:center}
.profile-mini span svg{width:20px;height:20px;color:var(--forest-600)}
.profile-mini strong{font-family:var(--font-display);font-size:24px;line-height:1;color:var(--forest-800);margin-top:5px;font-weight:600;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.profile-mini em{font-style:normal;color:var(--ink-500);font-weight:700;font-size:12px;margin-top:6px;letter-spacing:.005em}

.profile-links{display:grid;gap:10px}
.profile-link{display:flex;align-items:center;gap:12px;padding:15px;text-align:left;transition:background var(--t-fast),transform .1s}
.profile-link:hover{background:var(--cream-50);transform:translateY(-1px)}
.profile-link>svg{width:22px;height:22px;color:var(--forest-700);flex-shrink:0}
.profile-link strong{display:block;letter-spacing:-.005em}
.profile-link span{display:block;color:var(--ink-500);font-size:12.5px;font-weight:600;margin-top:1px}


/* ──────────────────────────────────────────────────────────
   13. UPDATES / ANNOUNCEMENTS
   ────────────────────────────────────────────────────────── */
.updates{display:flex;flex-direction:column;gap:10px}
.update-card{
  display:flex;gap:12px;
  background:var(--paper);border:1px solid var(--line);
  border-radius:15px;padding:15px 16px;
  box-shadow:var(--shadow-xs);
  transition:box-shadow var(--t-fast);
}
.update-card:hover{box-shadow:var(--shadow-sm)}
.update-card.pinned{
  border-color:var(--clay-300);
  background:linear-gradient(180deg,#fdf6ed,var(--paper));
}
.uc-ic{
  width:40px;height:40px;border-radius:12px;flex-shrink:0;
  display:grid;place-items:center;
  background:linear-gradient(135deg,var(--sage-100),var(--sage-200));
  color:var(--forest-600);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.4);
}
.update-card.pinned .uc-ic{
  background:linear-gradient(135deg,var(--clay-100),var(--clay-200));
  color:var(--clay-700);
}
.uc-ic svg{width:18px;height:18px}
.uc-body{flex:1;min-width:0}
.uc-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.uc-top h4{font-size:15px;font-weight:700;color:var(--ink-900);letter-spacing:-.005em}
.uc-pin{
  font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  color:var(--clay-700);background:var(--clay-100);
  border:1px solid rgba(140,75,40,.16);
  padding:2px 8px;border-radius:20px;
}
.uc-body p{font-size:13px;color:var(--ink-700);line-height:1.55;margin-top:4px}
.uc-meta{font-size:11.5px;color:var(--ink-400);font-weight:600;margin-top:7px;letter-spacing:.005em}
.uc-del{flex-shrink:0;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:transparent;color:var(--ink-400);transition:all var(--t-fast)}
.uc-del:hover{background:#fbeae8;color:var(--status-bad)}
.uc-del svg{width:15px;height:15px}


/* ──────────────────────────────────────────────────────────
   14. AVAILABILITY
   ────────────────────────────────────────────────────────── */
.lbl-hint{font-weight:600;color:var(--ink-400);font-size:11px}
.av-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.av-free{background:#3fa45e}
.av-part{background:#d8a93a}
.av-off{background:#cc4759}

.avail-list{display:flex;flex-direction:column;gap:8px}
.avail-row{
  display:flex;align-items:center;gap:11px;flex-wrap:wrap;
  background:var(--paper);border:1px solid var(--line);
  border-radius:14px;padding:11px 14px;
  box-shadow:var(--shadow-xs);
  border-left:4px solid var(--sage-300);
}
.avail-row.available{border-left-color:#3fa45e}
.avail-row.partial{border-left-color:#d8a93a}
.avail-row.unavailable{border-left-color:#cc4759;opacity:.92}
.ar-date{flex-shrink:0;width:54px}
.ar-date strong{display:block;font-size:13px;font-weight:800;text-transform:uppercase;color:var(--ink-700);letter-spacing:.04em}
.ar-date span{font-size:11.5px;color:var(--ink-500)}
.ar-seg{display:flex;gap:0;background:var(--cream-100);border-radius:11px;padding:3px;flex:1;min-width:180px}
.seg{flex:1;padding:7px 4px;border-radius:8px;font-size:12px;font-weight:700;color:var(--ink-500);transition:all var(--t-fast)}
.seg.on.available{background:#3fa45e;color:#fff;box-shadow:0 1px 3px rgba(63,164,94,.32)}
.seg.on.partial{background:#d8a93a;color:#fff;box-shadow:0 1px 3px rgba(216,169,58,.34)}
.seg.on.unavailable{background:#cc4759;color:#fff;box-shadow:0 1px 3px rgba(204,71,89,.32)}
.ar-note{flex-basis:100%;height:38px;border:1.5px solid var(--line-strong);border-radius:10px;padding:0 12px;font-size:13px;background:#fff}
.ar-note:focus{outline:0;border-color:var(--forest-500);box-shadow:var(--ring-focus)}
.ar-notetxt{flex-basis:100%;font-size:12px;color:var(--ink-500);font-style:italic}

.weekly-avail{padding:6px 0}
.wa-row{display:flex;align-items:center;gap:13px;padding:11px 16px;border-bottom:1px solid var(--line)}
.wa-row:last-child{border-bottom:0}
.wa-toggle{width:44px;height:26px;border-radius:20px;background:var(--cream-200);position:relative;flex-shrink:0;transition:background var(--t)}
.wa-toggle span{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.22);transition:transform var(--t) var(--ease-spring)}
.wa-toggle.on{background:linear-gradient(140deg,var(--forest-500),var(--forest-600))}
.wa-toggle.on span{transform:translateX(18px)}
.wa-day{font-size:14px;font-weight:700;width:40px;flex-shrink:0;letter-spacing:-.005em}
.wa-times{display:flex;align-items:center;gap:8px;color:var(--ink-500)}
.wa-time{height:38px;border:1.5px solid var(--line-strong);border-radius:10px;padding:0 10px;font-size:13px;background:#fff}
.wa-time:focus{outline:0;border-color:var(--forest-500);box-shadow:var(--ring-focus)}
.wa-off{font-size:13px;color:var(--ink-400);font-style:italic}

.avail-grid-wrap{overflow-x:auto;padding:4px}
.avail-grid{width:100%;border-collapse:collapse;min-width:520px}
.avail-grid th{font-size:11px;font-weight:800;color:var(--ink-500);text-transform:uppercase;letter-spacing:.06em;padding:10px 4px;text-align:center}
.avail-grid th small{display:block;font-size:12px;color:var(--ink-400);font-weight:700}
.avail-grid th:first-child{text-align:left;padding-left:12px}
.ag-name{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;padding:9px 12px;white-space:nowrap;letter-spacing:-.005em}
.ag-cell{text-align:center;font-size:15px;padding:9px 4px;border-top:1px solid var(--line)}
.ag-cell.available{color:#3fa45e}
.ag-cell.partial{color:#d8a93a}
.ag-cell.unavailable{color:#cc4759}

.avail-legend{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:14px;font-size:12px;color:var(--ink-500);font-weight:600}
.avail-legend i{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.lg.available{background:#3fa45e}
.lg.partial{background:#d8a93a}
.lg.unavailable{background:#cc4759}
.lg.booked{background:var(--forest-700)}


/* ──────────────────────────────────────────────────────────
   15. MODAL & SHIFT BUILDER
   ────────────────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;z-index:150;
  background:rgba(22,38,22,.55);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:flex;align-items:flex-end;justify-content:center;
  animation:fade .2s ease;padding:0;
  overflow:hidden;max-height:100dvh;
}
@media(min-width:600px){.modal-overlay{align-items:center;padding:20px}}
@keyframes fade{from{opacity:0}to{opacity:1}}

.modal{
  width:100%;max-width:480px;
  background:var(--paper);border-radius:24px 24px 0 0;
  max-height:92dvh;display:flex;flex-direction:column;
  box-shadow:var(--shadow-xl);
  animation:slideUp .3s var(--ease-out);
  overflow:hidden;min-height:0;
}
@media(min-width:600px){.modal{border-radius:24px;max-height:88vh}}
@keyframes slideUp{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}

.modal-head{display:flex;align-items:center;padding:22px 24px 14px}
.modal-head h2{font-family:var(--font-display);font-size:22px;font-weight:500;flex:1;letter-spacing:-.022em}
.modal-x{
  width:36px;height:36px;border-radius:11px;
  font-size:22px;line-height:1;color:var(--ink-500);
  background:var(--cream-100);display:grid;place-items:center;
  transition:all var(--t-fast);
}
.modal-x:hover{background:var(--sage-100);color:var(--forest-700)}
.modal-body{padding:0 24px;overflow-y:auto;overscroll-behavior:contain;flex:1 1 auto;min-height:0}
.modal-foot{
  display:flex;align-items:center;gap:10px;
  padding:16px 24px calc(18px + var(--safe-b));
  border-top:1px solid var(--line);margin-top:8px;
  flex:0 0 auto;
}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.chip-select,.sv-time{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.sel-chip{
  padding:9px 15px;border-radius:11px;
  background:var(--cream-100);border:1.5px solid var(--line);
  font-size:13px;font-weight:700;color:var(--ink-700);
  transition:all var(--t-fast);
}
.sel-chip.on{background:var(--forest-600);border-color:transparent;color:#fff;box-shadow:0 2px 6px rgba(30,55,30,.22)}
.sv-time{margin-bottom:14px;font-size:15px}
.sv-time em{font-style:normal;color:var(--clay-600);font-weight:800}
.person-hero{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.ph-title{font-size:13.5px;color:var(--ink-500);margin-bottom:6px}

/* Shift modal */
.shift-modal{height:auto;max-height:min(92dvh,820px)}

/* Desktop / laptop: make the Add a shift panel much wider and taller */
@media(min-width:1024px){
  .shift-modal{max-width:860px!important;max-height:94dvh!important;width:94vw}
  .shift-modal .modal-body{padding:6px 28px 8px}
  /* lay the builder panels out in two columns to use the width and show more at once */
  .shift-modal .shift-builder{
    display:grid!important;grid-template-columns:1fr 1fr;gap:14px;align-items:start;
  }
  /* the client/job search panel spans the full width on top */
  .shift-modal .client-search-panel{grid-column:1 / -1}
  .shift-modal .notes-open-panel:last-of-type{grid-column:1 / -1}
}
@media(min-width:1280px){
  .shift-modal{max-width:960px!important}
}
.shift-modal .modal-body{overflow-y:auto;overscroll-behavior:contain}
.shift-modal .modal-foot{margin-top:0;box-shadow:0 -10px 24px rgba(25,40,25,.08)}

.shift-builder{display:grid;gap:8px;padding-bottom:8px}
.shift-panel{
  background:linear-gradient(180deg,#fffdf8,#f6f1e6);
  border:1px solid var(--line-strong);border-radius:14px;
  box-shadow:var(--shadow-xs);padding:11px 12px;overflow:hidden;
}
.panel-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;color:var(--forest-800);font-weight:900;font-size:13.5px}
.panel-title span{display:flex;align-items:center;gap:8px;min-width:0}
.panel-title svg{width:17px;height:17px;color:var(--forest-600)}
.panel-title small{font-size:11px;color:var(--ink-500);font-weight:800;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:46%}

.selected-client-card{
  display:grid;gap:2px;padding:12px 13px;border-radius:15px;
  background:linear-gradient(135deg,var(--sage-100),var(--sage-200));
  border:1px solid rgba(74,115,81,.18);
  margin-bottom:10px;
}
.selected-client-card strong{font-size:14px;color:var(--forest-800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.005em}
.selected-client-card span{font-size:12px;color:var(--ink-700);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.client-search-panel .client-picker.is-collapsed{display:none}
.client-search-panel .client-picker{
  margin-top:8px;margin-bottom:2px;max-height:200px;overflow:auto;
  border:1px solid var(--line-strong);border-radius:14px;
  background:var(--paper);box-shadow:var(--shadow-xs);padding:5px;
}
.client-search-panel .client-search-row{
  width:100%;min-height:46px;padding:9px 11px;border-radius:11px;
  background:transparent;box-shadow:none;border:0;color:var(--ink-900);
  display:flex;align-items:center;cursor:pointer;text-align:left;
  transition:background var(--t-fast);
}
.client-search-panel .client-search-row:hover,.client-search-panel .client-search-row:active{background:var(--cream-50)}
.client-search-panel .client-search-row .pick-main{display:flex;flex-direction:column;gap:1px;min-width:0}
.client-search-panel .client-search-row .pick-main strong{font-size:14px;line-height:1.15;color:var(--ink-900);font-weight:800;letter-spacing:-.005em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-search-panel .client-search-row .pick-main em{font-style:normal;font-size:12px;color:var(--ink-500);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.picker-empty{padding:14px 12px;text-align:center;font-size:12.5px;font-weight:600;color:var(--ink-400)}

/* clean search bar with clear button */
.client-search-box{
  display:flex;align-items:center;gap:9px;
  height:48px;border-radius:13px;padding:0 12px;margin:0;
  background:#fff;border:1.5px solid var(--line-strong);
  transition:border-color var(--t-fast),box-shadow var(--t-fast);
}
.client-search-box:focus-within{border-color:var(--forest-500);box-shadow:var(--ring-focus)}
.client-search-box.has-selected{border-color:var(--forest-500);background:var(--sage-50,#eef3e7)}
.csb-ic{display:flex;flex-shrink:0}
.csb-ic svg{width:17px;height:17px;color:var(--ink-500);fill:none;stroke:currentColor;stroke-width:2}
.client-search-box.has-selected .csb-ic svg{color:var(--forest-600)}
.client-search-box input{flex:1;border:0;outline:0;background:transparent;font-size:15px;font-weight:700;color:var(--ink-900);min-width:0}
.client-search-box input::placeholder{color:var(--ink-400);font-weight:600}
.client-search-box input[readonly]{cursor:default}
.client-search-box input::-webkit-search-cancel-button{display:none;-webkit-appearance:none}
.csb-clear{flex-shrink:0;width:28px;height:28px;border-radius:50%;border:0;cursor:pointer;
  display:grid;place-items:center;background:var(--forest-600);color:#fff}
.csb-clear svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.4}
.csb-clear:active{transform:scale(.9)}

.smart-picker{display:flex;flex-direction:column;gap:0;margin:0 0 10px;padding-bottom:4px}
.picker-row{
  display:grid;align-items:center;gap:10px;
  padding:10px;border-radius:13px;
  background:transparent;
  transition:background var(--t-fast);
}
.picker-row:hover{background:var(--cream-50)}
.picker-row.selected{background:var(--sage-100)}
.pick-check{
  width:24px;height:24px;border-radius:50%;
  border:1.5px solid var(--sage-300);background:#fff;
  color:transparent;font-size:14px;display:grid;place-items:center;line-height:1;flex-shrink:0;
}
.picker-row.selected .pick-check{background:var(--forest-600);border-color:var(--forest-600);color:#fff}
.pick-main{display:grid;gap:1px;min-width:0}
.pick-main strong{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.005em}

.picker-tools{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.mini-tool{
  height:30px;padding:0 11px;border-radius:9px;
  background:var(--cream-100);border:1px solid var(--line);
  font-size:11.5px;font-weight:800;color:var(--ink-700);
  transition:background var(--t-fast);
}
.mini-tool:hover{background:var(--sage-100);color:var(--forest-700)}

.availability-warning{
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
  padding:10px 12px;border-radius:14px;
  background:rgba(74,115,81,.10);border:1px solid rgba(74,115,81,.18);
  margin-bottom:13px;
}
.availability-warning strong{font-size:12.2px;color:var(--forest-800);letter-spacing:-.005em}
.availability-warning span{font-size:12px;color:var(--ink-700);font-weight:700;text-align:right}

.compact-avail{padding:8px 10px;border-radius:11px;margin:8px 0 10px;background:linear-gradient(135deg,#f8f4ea,var(--cream-50));border:1px solid var(--line);align-items:center}
.compact-avail strong{font-size:11.5px;color:var(--forest-800);letter-spacing:-.005em}
.compact-avail span{font-size:11px;color:var(--ink-600);line-height:1.3}

.shift-section{border-radius:14px;overflow:hidden;background:transparent}
.shift-section>summary{
  display:flex;align-items:center;list-style:none;cursor:pointer;
  padding:10px 12px;min-height:42px;
}
.shift-section>summary::-webkit-details-marker{display:none}
.shift-section>summary span{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:800;color:var(--ink-900)}
.shift-section>summary svg{width:17px;height:17px;color:var(--forest-600)}
.shift-section>summary small{margin-left:auto;font-size:10.5px;color:var(--ink-500);font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:44%}

/* Employee picker dark variant */
.employee-picker.simple-list{
  gap:0;background:var(--paper);border:1px solid var(--line-strong);
  border-radius:14px;padding:4px;max-height:222px;
  box-shadow:none;overflow:auto;
}
.employee-picker.simple-list .picker-row{
  display:grid;grid-template-columns:24px minmax(0,1fr);gap:9px;
  min-height:39px;border:0;border-radius:10px;
  background:transparent;color:var(--ink-900);
  box-shadow:none;padding:5px 7px;
}
.employee-picker.simple-list .picker-row + .picker-row{border-top:1px solid var(--line);border-radius:0}
.employee-picker.simple-list .picker-row:hover{background:var(--cream-50);transform:none;box-shadow:none}
.employee-picker.simple-list .picker-row.selected{background:var(--sage-100);color:var(--forest-900);border-radius:10px}
.employee-picker.simple-list .picker-row.is-unavailable:not(.selected){opacity:.7;background:transparent}
.employee-picker.simple-list .pick-check{
  width:20px;height:20px;border-radius:50%;background:#fff;
  border:1.5px solid var(--sage-300);color:transparent;font-size:12px;
}
.employee-picker.simple-list .picker-row.selected .pick-check{background:var(--forest-600);color:#fff;border-color:var(--forest-600)}

.simple-emp-text{min-width:0;display:grid;gap:0}
.simple-emp-text strong{font-size:13px;line-height:1.1;color:var(--ink-900);font-weight:700;letter-spacing:-.005em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.simple-emp-text em{font-style:normal;font-size:10px;font-weight:800;color:var(--ink-500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.simple-emp-text em.av-off{color:var(--status-bad);background:transparent}
.simple-emp-text em.av-part{color:var(--status-warn);background:transparent}
.simple-emp-text em.av-free{color:var(--status-ok);background:transparent}

.employee-section .slim-search{margin-bottom:6px}
.employee-section .slim-tools{margin-bottom:6px;display:flex;gap:6px;flex-wrap:wrap}

/* Quick-add */
.quick-add-panel{border-top:1px solid var(--line);padding:0 0 12px;margin-bottom:2px}
.quick-add-panel>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--forest-700);font-weight:900;font-size:13px;padding:10px 0}
.quick-add-panel>summary::-webkit-details-marker{display:none}
.quick-add-panel svg{width:17px;height:17px}
.quick-add-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.quick-add-grid .btn{grid-column:1/-1}

.quick-add-client-details{border-top:1px solid var(--line);padding-top:10px;margin-top:5px;margin-bottom:0}
.quick-add-client-details>summary{
  list-style:none;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  min-height:36px;padding:0 2px;
  color:var(--forest-700);font-weight:900;font-size:13px;
}
.quick-add-client-details>summary::-webkit-details-marker{display:none}
.quick-add-client-details>summary span{display:inline-flex;align-items:center;gap:7px}
.quick-add-client-details>summary svg{width:16px;height:16px}
.quick-add-client-details>summary small{font-size:10px;color:var(--ink-500);font-weight:900}
.quick-add-client-details>summary:after{content:'⌄';font-size:17px;color:var(--ink-500);line-height:1;transition:transform var(--t)}
.quick-add-client-details[open]>summary:after{transform:rotate(180deg)}
.quick-add-client-details .quick-add-grid{padding-top:7px}

.flat-add-client{border-top:1px solid var(--line);padding-top:11px;margin-top:2px;margin-bottom:0}
.qa-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:900;color:var(--forest-700);margin-bottom:9px}
.qa-title svg{width:17px;height:17px}

.notes-open-panel{padding-bottom:10px}
.notes-open-panel .field{margin-top:2px}
.notes-textarea{min-height:78px;resize:vertical;line-height:1.45}

.visibility-section select.input{font-weight:800;color:var(--forest-800)}
.visibility-section .co-hint{font-size:11.5px;line-height:1.4}

body.modal-open,body.modal-open #app{height:100dvh;max-height:100dvh;overflow:hidden}
html:has(body.modal-open){height:100dvh;max-height:100dvh;overflow:hidden}
body.modal-open #modalHost{position:fixed;inset:0;overflow:hidden;z-index:150}


/* ──────────────────────────────────────────────────────────
   16. EMPLOYEE SHIFT CARDS
   ────────────────────────────────────────────────────────── */
.emp-shift{
  position:relative;background:#fff;
  border:1px solid var(--line);border-radius:18px;
  padding:16px 17px;margin-bottom:11px;overflow:hidden;
  --solid:#2f7d4a;--deep:#1f5e34;
  box-shadow:
    0 1px 2px rgba(20,30,20,.04),
    0 6px 16px -8px color-mix(in srgb,var(--solid) 30%,transparent);
  transition:box-shadow var(--t),transform .12s;
}
.emp-shift:hover{transform:translateY(-1px);box-shadow:0 2px 4px rgba(20,30,20,.05),0 10px 24px -8px color-mix(in srgb,var(--solid) 40%,transparent)}
.emp-shift::before{content:"";position:absolute;top:0;left:0;width:80px;height:80px;background:radial-gradient(circle at top left,color-mix(in srgb,var(--solid) 22%,transparent),transparent 70%);pointer-events:none}
.emp-shift::after{content:"";position:absolute;bottom:0;right:0;width:90px;height:90px;background:radial-gradient(circle at bottom right,color-mix(in srgb,var(--solid) 16%,transparent),transparent 70%);pointer-events:none}
.es-corner{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--solid),color-mix(in srgb,var(--solid) 30%,transparent))}
.emp-shift.done,.emp-shift.declined{opacity:.7}

.es-head{position:relative}
.es-time{font-size:12px;font-weight:700;color:var(--deep);margin-bottom:4px;letter-spacing:.005em}
.es-time strong{color:var(--solid);font-weight:800}
.es-head h3{font-family:var(--font-display);font-size:20px;font-weight:500;letter-spacing:-.018em;color:var(--ink-900)}
.es-loc{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-500);margin-top:5px}
.es-loc svg{width:13px;height:13px;color:var(--solid);opacity:.85;flex-shrink:0}
.es-note{
  font-size:12.5px;color:var(--ink-700);
  background:var(--cream-100);border-radius:10px;
  padding:9px 12px;margin-top:9px;line-height:1.45;
}
.es-actions{position:relative;display:flex;gap:8px;margin-top:14px;padding-top:13px;border-top:1px solid var(--line)}
.ec-accept,.ec-reject,.ec-start{
  height:42px;border-radius:12px;font-size:13.5px;font-weight:700;letter-spacing:-.005em;
  transition:transform .1s,box-shadow var(--t-fast);
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.ec-accept:active,.ec-reject:active,.ec-start:active{transform:scale(.96)}
.ec-reject{flex:1;background:#fff;border:1.5px solid rgba(168,57,47,.3);color:var(--status-bad)}
.ec-reject:hover{background:#fdf0ee}
.ec-accept{flex:1;background:var(--sage-100);color:var(--forest-700)}
.ec-accept:hover{background:var(--sage-200)}
.ec-start{
  flex:1.4;background:linear-gradient(140deg,var(--solid),var(--deep));color:#fff;
  box-shadow:0 5px 14px -4px color-mix(in srgb,var(--solid) 60%,transparent),inset 0 1px 0 rgba(255,255,255,.15);
}
.ec-start svg,.ec-accept svg,.ec-reject svg{width:16px;height:16px}
.ec-done{
  flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  height:42px;border-radius:12px;background:var(--sage-100);color:var(--forest-600);
  font-weight:700;font-size:13.5px;
}
.ec-done svg{width:17px;height:17px;stroke-width:2.4}
.ec-declined{
  flex:1;display:flex;align-items:center;justify-content:center;height:42px;
  border-radius:12px;background:var(--status-bad-bg);color:var(--status-bad);
  font-weight:700;font-size:13.5px;
}


/* ──────────────────────────────────────────────────────────
   17. TOPBAR PROFILE + MOBILE-SPECIFIC POLISH
   ────────────────────────────────────────────────────────── */
.top-profile{
  height:44px;border-radius:14px;
  display:flex;align-items:center;gap:9px;padding:0 6px 0 7px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);

/* ============================================================
   LOGIN SCREEN — clean, professional, EarthRoster brand
   ============================================================ */
.login-root{
  position:fixed;inset:0;z-index:10;
  display:grid;place-items:center;
  padding:24px 16px;
  background:
    radial-gradient(130% 70% at 50% -25%, #2e5538 0%, transparent 55%),
    radial-gradient(70% 50% at 82% 8%, rgba(196,150,90,.16) 0%, transparent 55%),
    linear-gradient(168deg, #1a3322 0%, #102516 50%, #0a160e 100%) !important;
  overflow:auto;
}
/* designed scene layers */
.lr-glow{position:absolute;inset:0;pointer-events:none;overflow:hidden}
/* aurora wash */
.lr-glow::before{
  content:"";position:absolute;left:-20%;right:-20%;top:-30%;height:90%;
  background:
    radial-gradient(45% 60% at 30% 40%, rgba(74,143,90,.22), transparent 70%),
    radial-gradient(40% 55% at 72% 30%, rgba(150,168,132,.18), transparent 70%);
  filter:blur(20px);transform:rotate(-6deg);
}
/* flowing layered hills at the bottom — eco landscape */
.lr-hills{
  position:absolute;left:0;right:0;bottom:0;height:46%;pointer-events:none;
}
.lr-hills::before,.lr-hills::after{content:"";position:absolute;left:-5%;right:-5%;border-radius:50% 50% 0 0/100% 100% 0 0}
.lr-hills::before{
  bottom:0;height:78%;
  background:linear-gradient(180deg,#234a30,#16301f);
  box-shadow:0 -1px 0 rgba(150,168,132,.12);
  transform:scaleX(1.4);
}
.lr-hills::after{
  bottom:0;height:52%;left:-30%;right:30%;
  background:linear-gradient(180deg,#2c5a3b,#1d3f28);
  box-shadow:0 -1px 0 rgba(150,168,132,.16);
  transform:scaleX(1.3) translateX(8%);
}
/* floating leaves / sparkle accents */
.lr-dots{
  position:absolute;inset:0;pointer-events:none;
  background-image:
    radial-gradient(circle 3px at 14% 24%, rgba(150,168,132,.5), transparent 60%),
    radial-gradient(circle 2px at 78% 18%, rgba(196,150,90,.5), transparent 60%),
    radial-gradient(circle 2px at 62% 40%, rgba(150,168,132,.45), transparent 60%),
    radial-gradient(circle 3px at 30% 64%, rgba(150,168,132,.35), transparent 60%),
    radial-gradient(circle 2px at 88% 56%, rgba(196,150,90,.4), transparent 60%),
    radial-gradient(circle 2px at 8% 48%, rgba(150,168,132,.4), transparent 60%);
  background-repeat:no-repeat;
}

.adts-mini em{font-style:normal;font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#5a6a5d}
.adts-mini strong{font-family:var(--font-display,'Fraunces',serif);font-size:16px;font-weight:700;color:#142016;line-height:1.05}

.adts-emp-list{display:flex;flex-direction:column;gap:0;padding:0 6px 6px}

.adts-emp-meta strong{font-size:13px;color:#142016;font-weight:700}
.adts-emp-meta em{font-size:10.5px;font-style:normal;color:#5a6a5d;font-weight:600}
.adts-emp-btn b{flex-shrink:0;font-size:11.5px;font-weight:800;color:#1d4d33;font-family:var(--font-display,'Fraunces',serif)}

/* Selected employee card — name + nav + pay summary in one panel */
.adts-emp-card{

.adts-emp-head{

.adts-emp-av{

.adts-emp-copy strong{font-size:14px;color:#142016;font-weight:800;letter-spacing:-.005em}
.adts-emp-copy span{font-size:11px;color:#3a5a3d;font-weight:600}

.adts-nav-btn{

.adts-emp-pay{

.adts-emp-pay-hero{

}
.adts-emp-pay-hero em{font-style:normal;font-size:9.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:rgba(220,232,212,.78)}
.adts-emp-pay-hero strong{font-family:var(--font-display,'Fraunces',serif);font-size:20px;font-weight:700;color:#fff;line-height:1}

.adts-emp-pay-mini{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.adts-emp-pay-mini > div{

.adts-emp-pay-mini em{font-style:normal;font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#5a6a5d}
.adts-emp-pay-mini strong{font-size:13px;color:#142016;font-weight:800;line-height:1.05}

/* Day chips */
.adts-day-row{

  grid-template-columns:repeat(7,minmax(0,1fr));

}
.adts-day{

.adts-day > span{font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#5a6a5d}
.adts-day > strong{font-size:14px;font-weight:800;color:#142016;line-height:1}
.adts-day > em{font-size:9.5px;color:#3a5a3d;font-weight:700;font-style:normal}
.adts-day.today{border-color:rgba(168,82,40,.40);background:linear-gradient(180deg,#fff,#fef1e2)}
.adts-day.today > strong{color:#a8521e}
.adts-day.sel{
  background:linear-gradient(180deg,#1d4d33,#0f2f1f);

  box-shadow:0 6px 14px -4px rgba(20,80,40,.45);

.adts-day.sel > span{color:rgba(220,232,212,.75)}
.adts-day.sel > strong{color:#fff}

/* Day card */
.adts-day-card{
  padding:12px 14px;
  border-radius:14px;
  background:#fff;
  border:1px solid rgba(58,93,59,.18);
  box-shadow:0 4px 12px -6px rgba(20,40,20,.10);
}
.adts-day-head{
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;margin-bottom:10px;
}
.adts-day-head strong{font-size:14px;color:#142016;font-weight:800;display:block}
.adts-day-head span{font-size:11.5px;color:#5a6a5d;font-weight:600}
.adts-day-head .pill{
  font-size:9.5px;font-weight:800;letter-spacing:.05em;
  text-transform:uppercase;padding:3px 9px;border-radius:20px;
}

.adts-empty{
  text-align:center;padding:18px 6px 6px;
}
.adts-empty svg{width:34px;height:34px;color:#1d4d33;opacity:.4}
.adts-empty p{font-size:13px;color:#2a3a2c;font-weight:700;margin:8px 0 2px}
.adts-empty span{font-size:11.5px;color:#5a6a5d;font-weight:500;display:block}

/* Desktop */
@media(min-width:1024px){
  .adts-hero h2{font-size:22px}
  .adts-stat.hero strong{font-size:32px}
  .adts-mini strong{font-size:18px}
  .adts-emp-pay-hero strong{font-size:24px}
  .adts-day > strong{font-size:16px}
}

/* ============================================================
   CHAT THREAD — single header + sticky composer (mobile)
   When a conversation is open on mobile we collapse the global
   topbar and promote the thread head to be the one true header,
   safely below the status bar. The message list scrolls freely
   while the header stays pinned up top and composer pinned down.
   ============================================================ */
@media(max-width:1023px){
  /* Hide the duplicate global "Messages / Team messages…" topbar
     only while a single conversation is open. */
  body.chat-thread-open .topbar{display:none!important}
  body.chat-thread-open .main{padding-top:0!important}
  body.chat-thread-open .content{padding:0!important;overflow:hidden!important}
  body.chat-thread-open .page{height:100dvh!important}

  /* The conversation becomes a fixed full-screen panel so the
     header pins to the very top and the composer to the very
     bottom, independent of any page scrolling. The panel fills
     the entire screen and covers the bottom nav. */
  body.chat-thread-open .chat-shell{
    position:fixed!important;
    top:0!important;left:0!important;right:0!important;
    bottom:0!important;
    height:100dvh!important;
    min-height:0!important;
    margin:0!important;
    padding:0!important;
    gap:0!important;
    z-index:120!important;
  }
  body.chat-thread-open .chat-list{display:none!important}
  body.chat-thread-open .chat-thread{
    display:flex!important;
    flex-direction:column!important;
    height:100dvh!important;
    border-radius:0!important;
    box-shadow:none!important;
  }

  /* Fixed header below the status bar. */
  body.chat-thread-open .chat-thread-head{
    flex:0 0 auto!important;
    padding-top:calc(12px + var(--safe-t))!important;
    padding-bottom:12px!important;
    min-height:calc(54px + var(--safe-t))!important;
    align-items:center!important;
    border-radius:0!important;
  }
  body.chat-thread-open .cth-back{display:grid!important}

  /* The ONLY scrolling area. */
  body.chat-thread-open .chat-scroll{
    flex:1 1 auto!important;
    min-height:0!important;
    overflow-y:auto!important;
    -webkit-overflow-scrolling:touch!important;
    overscroll-behavior:contain!important;
  }

  /* Composer pinned to the very bottom, over where the nav was. */
  body.chat-thread-open .chat-composer{
    flex:0 0 auto!important;
    padding:12px 12px calc(12px + var(--safe-b))!important;
    gap:10px!important;
    background:var(--cream-50)!important;
    border-top:1px solid var(--line)!important;
    border-radius:0!important;
  }
  body.chat-thread-open .chat-composer .input{
    border-radius:20px!important;
    font-size:16px!important;  /* 16px stops iOS zoom-on-focus */
  }
  body.chat-thread-open .chat-composer .csend{
    width:52px!important;
    height:52px!important;
    border-radius:18px!important;
    flex-shrink:0!important;
  }
  body.chat-thread-open .chat-readonly{
    flex:0 0 auto!important;
    padding-bottom:calc(16px + var(--safe-b))!important;
  }
  /* Hide the bottom nav entirely while a conversation is open so
     the composer covers it. Back arrow returns to the list. */
  body.chat-thread-open .mobile-nav{display:none!important}
  body.chat-thread-open .content,
  body.chat-thread-open .page{padding-bottom:0!important}
  body.chat-thread-open::after,
  body.chat-thread-open .content::after{display:none!important}
}

/* Client delete button + archived employee cards */
.client-card-list{position:relative}
.client-del-btn{
  flex-shrink:0;width:38px;height:38px;border-radius:12px;
  display:grid;place-items:center;
  background:#fff;border:1px solid rgba(168,57,47,.28);color:#a8392f;
  transition:background .15s,border-color .15s;
}
.client-del-btn:hover{background:#fdf0ee;border-color:rgba(168,57,47,.5)}
.client-del-btn svg{width:18px;height:18px}
.archived-card{opacity:.82}
.archived-card .dir-main em{color:var(--ink-500)}
@media(max-width:1023px){
  .client-del-btn{width:34px;height:34px;border-radius:11px}
  .client-del-btn svg{width:16px;height:16px}
}

/* ============================================================
   FLOATING NAV — bottom offset fix (installed PWA)
   In an installed app the home-indicator safe-area inset is large
   (~34px). Stacking a fixed 8px margin on top of the full inset
   left the pill floating too high with a big gap underneath. We
   instead sit the pill a small fixed distance above the safe area,
   so it hugs the bottom on browsers (where inset is 0) AND in the
   installed app (where the inset already provides clearance).
   ============================================================ */
@media(max-width:1023px){
  .mobile-nav{
    bottom:max(8px, var(--safe-b))!important;
  }
}
@media(max-width:380px){
  .mobile-nav{
    bottom:max(7px, var(--safe-b))!important;
  }
}

/* ============================================================
   ROSTER CARD — v3 BOLD: saturated, colour-filled, standout
   The whole card is washed in the client's colour (not just a
   rail), with a solid colour time panel. High contrast + vivid.
   Still slim enough that 4-5 fit on a phone screen.
   ============================================================ */
.rcard{
  position:relative;
  display:flex;
  align-items:stretch;
  gap:0;
  background:
    linear-gradient(135deg,
      color-mix(in srgb,var(--solid) 22%,#fff) 0%,
      color-mix(in srgb,var(--solid) 11%,#fff) 55%,
      color-mix(in srgb,var(--solid) 16%,#fff) 100%);
  border:1px solid color-mix(in srgb,var(--solid) 38%,transparent);
  border-radius:15px;
  margin-bottom:7px;
  overflow:hidden;
  box-shadow:0 4px 12px color-mix(in srgb,var(--solid) 22%,transparent), 0 1px 2px rgba(20,31,23,.06);
  transition:transform .14s ease, box-shadow .14s ease;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.rcard:active{transform:scale(.992)}
@media(hover:hover){.rcard:hover{box-shadow:0 8px 20px color-mix(in srgb,var(--solid) 32%,transparent);transform:translateY(-1px)}}

.rcard.is-draft{
  background:
    repeating-linear-gradient(135deg,
      color-mix(in srgb,var(--solid) 15%,#fff) 0px,
      color-mix(in srgb,var(--solid) 15%,#fff) 9px,
      color-mix(in srgb,var(--solid) 7%,#fff) 9px,
      color-mix(in srgb,var(--solid) 7%,#fff) 18px);
  border-style:dashed;
}

/* solid colour time panel — the big pop */
.rc-time{
  flex:0 0 60px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  padding:7px 4px;
  background:linear-gradient(165deg,var(--solid),var(--deep));
  color:#fff;
}
.rc-time strong{
  font-family:var(--font-display,Georgia,serif);
  font-size:17px;font-weight:800;line-height:1;color:#fff;
  display:flex;align-items:baseline;gap:1px;letter-spacing:-.02em;
  text-shadow:0 1px 2px rgba(0,0,0,.18);
}
.rc-time strong i{font-size:9px;font-style:normal;font-weight:800;opacity:.85}
.rc-dur{
  font-size:9.5px;font-weight:800;letter-spacing:.01em;
  color:var(--deep);background:rgba(255,255,255,.92);
  padding:2px 7px;border-radius:999px;line-height:1;white-space:nowrap;
}

/* body */
.rc-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;padding:6px 11px 6px;gap:1px}
.rc-top{display:flex;align-items:center;gap:7px}
.rc-top h3{
  flex:1;min-width:0;
  font-size:14.5px;font-weight:850;letter-spacing:-.02em;color:var(--deep);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0;
}
.rc-dot{flex:0 0 auto;width:9px;height:9px;border-radius:50%}
.rc-dot.on{background:var(--solid);box-shadow:0 0 0 3px color-mix(in srgb,var(--solid) 28%,transparent)}
.rc-dot.off{background:#c9821a;box-shadow:0 0 0 3px rgba(201,130,26,.22)}

.rc-meta{display:flex;align-items:center;gap:5px;font-size:11px;color:color-mix(in srgb,var(--deep) 72%,#5d6b60);min-width:0;font-weight:600}
.rc-end{font-weight:800;color:var(--deep);white-space:nowrap}
.rc-sep{opacity:.5}
.rc-addr{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}

.rc-foot{display:flex;align-items:center;gap:7px;margin-top:2px}
.rc-avs{display:flex;flex-shrink:0}
.rc-av{
  width:20px;height:20px;border-radius:50%;margin-left:-6px;
  display:grid;place-items:center;
  font-size:8.5px;font-weight:800;color:#fff;
  background:linear-gradient(150deg,var(--solid),var(--deep));
  border:2px solid color-mix(in srgb,var(--solid) 16%,#fff);
}
.rc-av:first-child{margin-left:0}
.rc-av-more,.rc-av-empty{background:var(--deep);color:#fff;opacity:.55}
.rc-names{
  flex:1;min-width:0;font-size:11px;font-weight:700;color:color-mix(in srgb,var(--deep) 65%,#5d6b60);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.rc-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* action buttons — slim, on the colour wash */
.rc-act{
  height:29px;border-radius:9px;border:none;cursor:pointer;
  font-size:11px;font-weight:800;letter-spacing:-.01em;
  display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:0 12px;
  transition:filter .14s ease, background .14s ease, transform .1s ease;
}
.rc-act:active{transform:scale(.95)}
.rc-act svg{width:13px;height:13px}
.rc-act-edit{width:29px;padding:0;background:rgba(255,255,255,.85);color:var(--deep)}
.rc-act-edit:hover{background:#fff}
.rc-pub.is-pub{background:linear-gradient(180deg,var(--solid),var(--deep));color:#fff;box-shadow:0 2px 6px color-mix(in srgb,var(--solid) 40%,transparent)}
.rc-pub.is-pub:hover{filter:brightness(1.08)}
.rc-pub.is-unpub{background:#fff3df;color:#9a6a12}
.rc-accept{background:linear-gradient(180deg,var(--solid),var(--deep));color:#fff;box-shadow:0 2px 6px color-mix(in srgb,var(--solid) 40%,transparent)}
.rc-accept:hover{filter:brightness(1.08)}
.rc-reject{width:29px;padding:0;background:rgba(255,255,255,.85);color:#b03a2c}
.rc-start{background:linear-gradient(180deg,var(--solid),var(--deep));color:#fff;box-shadow:0 2px 6px color-mix(in srgb,var(--solid) 40%,transparent)}
.rc-emp-state{
  height:29px;padding:0 12px;border-radius:9px;display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:800;
}
.rc-emp-state svg{width:13px;height:13px}
.rc-done{background:linear-gradient(180deg,var(--solid),var(--deep));color:#fff}
.rc-declined{background:#fdeeec;color:#b03a2c}
.rc-locked{background:rgba(255,255,255,.8);color:var(--deep)}

/* tighten for small phones so 4+ cards always fit */
@media(max-width:430px){
  .rcard{border-radius:15px;margin-bottom:8px}
  .rc-time{flex-basis:60px;padding:8px 4px}
  .rc-time strong{font-size:16px}
  .rc-dur{font-size:9px;padding:2px 6px}
  .rc-body{padding:7px 10px 8px}
  .rc-top h3{font-size:14px}
  .rc-meta{font-size:10.5px}
  .rc-av{width:21px;height:21px;font-size:8.5px}
  .rc-names{font-size:10.5px}
  .rc-act,.rc-emp-state{height:27px;font-size:10.5px;padding:0 10px}
  .rc-act-edit,.rc-reject{width:27px}
}
@media(max-width:360px){
  .rc-names{display:none}
  .rc-time{flex-basis:56px}
}

/* ----- skinny + consistent roster cards across all users (mobile) ----- */
@media(max-width:1023px){
  .rcard{margin-bottom:6px;border-radius:13px;align-items:stretch}
  .rc-time{flex:0 0 52px;padding:5px 4px;gap:2px}
  .rc-time strong{font-size:14px}
  .rc-time strong i{font-size:8px}
  .rc-dur{font-size:8.5px;padding:1px 6px}
  .rc-body{padding:6px 10px;gap:1px;justify-content:center}
  .rc-top h3{font-size:13.5px;font-weight:800}
  .rc-status{font-size:9px;padding:2px 7px}
  .rc-meta{font-size:10px;margin-top:0;gap:4px}
  .rc-foot{margin-top:3px;gap:6px}
  .rc-av{width:18px;height:18px;font-size:8px;margin-left:-5px}
  .rc-names{font-size:10px}
  /* keep employee action row compact so emp & admin cards match height */
  .rc-emp-actions{margin-top:5px;padding-top:5px;gap:6px}
  .rc-emp-actions .rc-act,.rc-emp-actions .rc-emp-state{height:28px;font-size:11px}
}


/* ============================================================
   CONVERSATION LIST — clean, professional, smooth (cv- classes)
   Replaces the old cl-/ct- styling. Crisp cards, clear hierarchy,
   buttery scrolling, distinct types (team / announcement / DM).
   ============================================================ */
.cv-list{
  display:flex;flex-direction:column;min-height:0;width:100%;
  background:transparent!important;border:none!important;box-shadow:none!important;border-radius:0!important;
}
.cv-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 4px 12px;background:transparent!important;border:none!important;
}
.cv-head-label{
  font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink-400,#8a958180);color:#7c8a72;
}
.cv-new{
  width:38px;height:38px;border-radius:13px;flex-shrink:0;
  display:grid;place-items:center;cursor:pointer;
  background:linear-gradient(145deg,var(--forest-500,#3f6b3e),var(--forest-700,#1d3d24))!important;
  color:#fff!important;border:none!important;
  box-shadow:0 4px 12px rgba(31,61,36,.28);
  transition:transform .12s ease, filter .12s ease;
}
.cv-new:hover{filter:brightness(1.08)}
.cv-new:active{transform:scale(.93)}
.cv-new svg{width:19px;height:19px;stroke-width:2.4}

.cv-threads{
  flex:1;min-height:0;overflow-y:auto;
  display:flex;flex-direction:column;gap:9px;
  padding:2px 2px 16px;
  scroll-behavior:smooth;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
}

/* card */
.cv-row{
  position:relative;display:flex;align-items:center;gap:13px;text-align:left;cursor:pointer;
  padding:13px 14px;border-radius:18px;width:100%;
  background:#fffdf9!important;
  border:1px solid rgba(20,31,23,.07)!important;
  box-shadow:0 2px 7px rgba(20,31,23,.045)!important;
  transition:transform .13s ease, box-shadow .13s ease, border-color .13s ease;
  -webkit-tap-highlight-color:transparent;
}
.cv-row:active{transform:scale(.99)}
@media(hover:hover){.cv-row:hover{box-shadow:0 6px 16px rgba(20,31,23,.1)!important;border-color:rgba(20,31,23,.12)!important}}
.cv-row.active{
  background:linear-gradient(135deg,#eef5e8,#fbf3e6)!important;
  border-color:rgba(63,107,62,.32)!important;
  box-shadow:0 4px 14px rgba(63,107,62,.14)!important;
}

/* avatar */
.cv-av{flex-shrink:0}
.cv-av .avatar{
  width:48px!important;height:48px!important;border-radius:15px!important;
  display:grid;place-items:center;font-size:16px;font-weight:800;
  box-shadow:0 3px 8px rgba(20,31,23,.14);
}
.cv-av .avatar svg{width:22px;height:22px}
.cv-type-team .cv-av .avatar{background:linear-gradient(145deg,#3f6b3e,#1d3d24)!important;color:#fff!important}
.cv-type-announcement .cv-av .avatar{background:linear-gradient(145deg,#c47a45,#9a5326)!important;color:#fff!important}
.cv-type-group .cv-av .avatar{background:linear-gradient(145deg,#5a8f7e,#33604f)!important;color:#fff!important}

/* body */
.cv-body{flex:1;min-width:0;display:flex!important;flex-direction:column;gap:2px}
.cv-top{display:flex!important;align-items:baseline;gap:8px;width:100%}
.cv-name{
  flex:1;min-width:0;font-size:15.5px;font-weight:800;letter-spacing:-.015em;color:var(--ink-900,#1a241c);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.cv-time{flex-shrink:0;font-size:11px;font-weight:700;color:#9aa090}
.cv-sub{
  display:block!important;
  font-size:10.5px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:#a9b0a1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.cv-type-announcement .cv-sub{color:#bd824f}
.cv-last{
  display:block!important;
  font-size:13px;color:var(--ink-500,#5d6b60);line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;
}
.cv-empty{font-style:italic;opacity:.7}

/* chevron */
.cv-chev{flex-shrink:0;display:grid;place-items:center;color:#c2c9bb;opacity:.65;transform:rotate(180deg)}
.cv-chev svg{width:18px;height:18px;stroke-width:2.2}
.cv-row.active .cv-chev{color:var(--forest-600,#2f6b3e);opacity:1}

@media(max-width:430px){
  .cv-row{padding:12px;border-radius:16px;gap:11px}
  .cv-av .avatar{width:46px!important;height:46px!important;border-radius:14px!important}
  .cv-name{font-size:15px}
  .cv-last{font-size:12.5px}
}


/* ============================================================
   CHAT ATTACHMENTS — attach button + in-bubble previews
   ============================================================ */
.chat-composer .cattach{
  flex-shrink:0;width:46px;height:46px;border-radius:23px;
  display:grid;place-items:center;cursor:pointer;
  background:#fff;border:1px solid var(--line,rgba(20,31,23,.1));
  color:var(--forest-700,#1d3d24);
  transition:background .14s ease, transform .1s ease;
}
.chat-composer .cattach:hover{background:var(--cream-100,#f3eee2)}
.chat-composer .cattach:active{transform:scale(.93)}
.chat-composer .cattach svg{width:20px;height:20px;stroke-width:2;fill:none;stroke:currentColor}
@media(max-width:1023px){
  body.chat-thread-open .chat-composer .cattach{width:52px;height:52px;border-radius:26px}
  body.chat-thread-open .chat-composer .cattach svg{width:22px;height:22px}
}

/* image attachment in a bubble */
.b-attach-img{display:block;margin:0 0 5px;padding:0;border:none;background:none;border-radius:12px;overflow:hidden;max-width:240px;cursor:pointer;width:100%}
.b-attach-img img{display:block;width:100%;height:auto;max-height:300px;object-fit:cover;border-radius:12px}
.b-attach-img:active{opacity:.9}

/* file (non-image) attachment chip */
.b-attach-file{
  display:flex;align-items:center;gap:9px;margin:0 0 5px;
  padding:9px 11px;border-radius:12px;cursor:pointer;text-align:left;width:100%;
  background:rgba(0,0,0,.05);border:1px solid rgba(0,0,0,.07);color:inherit;
  max-width:240px;
}
.b-attach-file:active{opacity:.85}
.msg.mine .b-attach-file{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.22)}
.baf-ic{flex-shrink:0;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:rgba(0,0,0,.06);color:inherit}
.msg.mine .baf-ic{background:rgba(255,255,255,.18)}
.baf-ic svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8}
.baf-meta{min-width:0;display:flex;flex-direction:column;gap:1px}
.baf-name{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.baf-size{font-size:10.5px;opacity:.7}


/* attachment viewer modal */
.attach-view{display:flex;align-items:center;justify-content:center;background:#0c130d;border-radius:14px;overflow:hidden;min-height:160px}
.attach-view img{max-width:100%;max-height:64vh;display:block;object-fit:contain}
.attach-view-pdf{background:#fff;min-height:0}
.attach-view-pdf iframe{width:100%;height:62vh;border:0;border-radius:14px;background:#fff}
.attach-view-generic{flex-direction:column;gap:8px;background:var(--cream-100,#f3eee2);color:var(--ink-700,#3a4a3c);padding:32px 18px}
.attach-view-generic .avg-ic{width:54px;height:54px;border-radius:15px;display:grid;place-items:center;background:#fff;color:var(--forest-700,#1d3d24)}
.attach-view-generic .avg-ic svg{width:26px;height:26px;fill:none;stroke:currentColor;stroke-width:1.7}
.attach-view-generic strong{font-size:15px}
.attach-hint{font-size:11.5px;color:var(--ink-500,#5d6b60);text-align:center;margin:8px 0 0}
.modal-foot .btn[href]{display:inline-flex;align-items:center;gap:6px;text-decoration:none}
.modal-foot .btn[href] svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2}


/* ============================================================
   DOCUMENT SIGN & FILL — assign fields, signature pad, viewer
   ============================================================ */
.ad-fields{display:flex;flex-direction:column;gap:7px;margin-bottom:9px}
.ad-field-row{display:flex;gap:7px;align-items:center}
.ad-field-row .ad-field-name{flex:1}
.ad-field-del{flex-shrink:0;width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:#fdeeec;border:1px solid rgba(168,57,47,.2);color:#b03a2c;cursor:pointer}
.ad-field-del svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8}

.sign-doc-head{display:flex;flex-direction:column;gap:2px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--line,#e7e2d5)}
.sign-doc-head strong{font-size:16px;font-weight:800;color:var(--ink-900,#1a241c)}
.sign-doc-head span{font-size:12px;color:var(--ink-500,#5d6b60)}
.btn-block{margin-bottom:12px}
.sign-fields-wrap{display:flex;flex-direction:column;gap:2px;margin-bottom:6px}

.sign-pad-wrap{position:relative;border:2px dashed rgba(63,107,62,.32);border-radius:14px;background:#fffdf8;overflow:hidden}
.sign-pad{display:block;width:100%;height:170px;touch-action:none;cursor:crosshair}
.sign-clear{position:absolute;top:8px;right:8px;font-size:11px;font-weight:800;padding:5px 10px;border-radius:9px;background:rgba(20,31,23,.06);border:none;color:var(--ink-700,#3a4a3c);cursor:pointer}
.sign-clear:active{background:rgba(20,31,23,.12)}

.sign-confirm{display:flex;align-items:flex-start;gap:9px;margin-top:12px;font-size:13px;color:var(--ink-700,#3a4a3c);line-height:1.35;cursor:pointer}
.sign-confirm input{margin-top:2px;width:18px;height:18px;flex-shrink:0;accent-color:var(--forest-600,#2f6b3e)}

/* completed/signed view */
.signed-fields{display:flex;flex-direction:column;gap:1px;margin:4px 0 14px;border:1px solid var(--line,#e7e2d5);border-radius:12px;overflow:hidden}
.sf-row{display:flex;justify-content:space-between;gap:12px;padding:11px 13px;background:#fffdf8}
.sf-row:nth-child(even){background:var(--cream-50,#f7f3ea)}
.sf-label{font-size:12px;font-weight:700;color:var(--ink-500,#5d6b60);flex-shrink:0;max-width:45%}
.sf-val{font-size:13px;font-weight:600;color:var(--ink-900,#1a241c);text-align:right}
.signed-sig{border:1px solid var(--line,#e7e2d5);border-radius:12px;background:#fff;padding:8px;display:flex;justify-content:center}
.signed-sig img{max-width:100%;max-height:150px}


/* ============================================================
   ADMIN TIMESHEET ROW (tsr) — skinny, tidy, actions on own line
   ============================================================ */
.tsr{
  position:relative;
  background:#fff;border:1px solid rgba(20,31,23,.08);border-radius:15px;
  padding:13px 14px 13px 18px;margin-bottom:9px;cursor:pointer;overflow:hidden;
  box-shadow:0 2px 7px rgba(20,31,23,.05);
  transition:box-shadow .13s ease, transform .13s ease;
}
.tsr::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px}
.tsr:active{transform:scale(.995)}
@media(hover:hover){.tsr:hover{box-shadow:0 6px 16px rgba(20,31,23,.1);transform:translateY(-1px)}}
/* per-status colour: pending=amber, approved=green, paid=forest, flagged=red */
.tsr.pending{background:linear-gradient(120deg,#fdf6e8,#fffdf9 60%);border-color:rgba(201,130,26,.22)}
.tsr.pending::before{background:linear-gradient(180deg,#e0a534,#b4761c)}
.tsr.approved{background:linear-gradient(120deg,#ecf5ec,#fffdf9 60%);border-color:rgba(63,107,62,.22)}
.tsr.approved::before{background:linear-gradient(180deg,#4a8f5a,#2f6b3e)}
.tsr.paid{background:linear-gradient(120deg,#eef2ee,#fffdf9 60%);border-color:rgba(31,61,36,.2);opacity:.92}
.tsr.paid::before{background:linear-gradient(180deg,#3f6b3e,#1d3d24)}
.tsr.flagged{background:linear-gradient(120deg,#fdeeea,#fffdf9 60%);border-color:rgba(176,58,44,.24)}
.tsr.flagged::before{background:linear-gradient(180deg,#cc6655,#a8392f)}
.tsr-main{display:flex;gap:11px;align-items:flex-start}
.tsr-ic{flex-shrink:0;width:38px;height:38px;border-radius:11px;display:grid;place-items:center;color:#fff;box-shadow:0 3px 8px rgba(20,31,23,.16)}
.tsr-ic svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2}
.tsr-ic.a{background:linear-gradient(150deg,#e0a534,#b4761c)}
.tsr-ic.g{background:linear-gradient(150deg,#4a8f5a,#2f6b3e)}
.tsr-ic.b{background:linear-gradient(150deg,#3f6b3e,#1d3d24)}
.tsr-ic.r{background:linear-gradient(150deg,#c66,#a8392f)}
.tsr-info{flex:1;min-width:0}
.tsr-top{display:flex;align-items:center;gap:8px;margin-bottom:1px}
.tsr-top strong{flex:1;min-width:0;font-size:14.5px;font-weight:800;color:var(--ink-900,#1a241c);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tsr-sub{font-size:12px;color:var(--ink-500,#5d6b60);margin-bottom:6px}
.tsr-stats{display:flex;flex-wrap:wrap;gap:5px 9px;font-size:12px;color:var(--ink-600,#4a5a4c);margin-bottom:6px}
.tsr-stats .tsr-strong{font-weight:800;color:var(--ink-900,#1a241c)}
.tsr-var{font-size:11px;font-weight:700;padding:5px 9px;border-radius:8px;line-height:1.3;display:inline-block}
.tsr-var.ok{background:#e9f3ea;color:#2f6b3e}
.tsr-var.warn{background:#fbf1de;color:#9a6a12}
.tsr-var.bad{background:#fbeae7;color:#b03a2c}
.tsr-var.neutral{background:var(--cream-100,#f3eee2);color:var(--ink-500,#5d6b60)}
.tsr-note{font-size:12px;color:var(--ink-500,#5d6b60);margin-top:6px;font-style:italic}
.tsr-actions{display:flex;gap:8px;margin-top:11px;padding-top:11px;border-top:1px solid rgba(20,31,23,.06)}
.tsr-actions .btn{flex:1;justify-content:center;height:36px;font-size:12.5px;padding:0}
.tsr-actions .btn svg{width:14px;height:14px}


/* employee timesheet card extras */
.tsr-hint{font-size:11.5px;color:var(--ink-400,#9aa090);margin-top:5px;font-weight:600}
.tsr-note{display:flex;align-items:center;gap:5px}
.tsr-emp .tsr-hint svg,.tsr-emp .tsr-note svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;vertical-align:-1px}
.tsr-emp.is-locked{opacity:.92}
.tsr-emp.is-locked .tsr-hint{color:var(--ink-500,#5d6b60)}
.pill.locked-pill{display:inline-flex;align-items:center;gap:3px}
.pill.locked-pill svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2}

/* ============================================================
   IMPORTANT UPDATES — standout panel
   ============================================================ */
.updates-panel{
  margin-top:6px;
  background:linear-gradient(160deg,#fbf8f0,#f1f5ea);
  border:1px solid rgba(63,107,62,.16);
  border-radius:20px;
  padding:16px 16px 8px;
  box-shadow:0 4px 16px rgba(31,61,36,.08);
}
.updates-panel .section-head h2{color:var(--forest-700,#1d3d24)}


/* simplified admin timesheet card edit hint */
.tsr-edit{flex-shrink:0;align-self:center;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:var(--cream-100,#f3eee2);color:var(--forest-700,#1d3d24)}
.tsr-edit svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2}
.tsr-stats{align-items:center}


/* ============================================================
   MOBILE NAV — docked flush to the very bottom (final override)
   No floating pill, no white/empty space below. The bar's green
   extends through the safe-area so nothing shows behind it.
   ============================================================ */
@media(max-width:1023px){
  /* Kill the floating gradient overlay that sat behind the pill */
  body::after{display:none!important;content:none!important}

  .mobile-nav{
    position:fixed!important;
    left:0!important;right:0!important;bottom:0!important;
    width:100%!important;margin:0!important;
    border-radius:20px 20px 0 0!important;
    padding:5px 8px calc(5px + var(--safe-b)) !important;
    background:linear-gradient(180deg,#3f663e 0%,#294f30 52%,#17311f 100%)!important;
    border:none!important;border-top:1px solid rgba(255,255,255,.12)!important;
    box-shadow:0 -6px 22px rgba(10,30,16,.26)!important;
    backdrop-filter:none!important;-webkit-backdrop-filter:none!important;
    z-index:95!important;
  }
  /* slimmer tabs */
  .mobile-nav .mtab{height:46px!important;padding:4px 2px!important}
  .mobile-nav .mtab > svg{width:20px!important;height:20px!important}
  .mobile-nav .mtab span{font-size:10px!important;margin-top:1px!important}
  /* Reserve space so page content never hides behind the docked bar */
  .content{padding-bottom:calc(74px + var(--safe-b))!important}
}
@media(max-width:380px){
  .mobile-nav{padding:4px 5px calc(5px + var(--safe-b))!important}
  .mobile-nav .mtab{height:44px!important}
}


/* employee roster card — actions on their own full-width row */
.rc-emp-actions{
  display:flex;gap:7px;margin-top:6px;padding-top:6px;
  border-top:1px solid color-mix(in srgb,var(--solid) 18%,transparent);
}
.rc-emp-actions .rc-act{flex:1;height:32px;font-size:12px}
.rc-emp-actions .rc-emp-state{flex:1;justify-content:center;height:32px}


/* ============================================================
   NOTIFICATIONS — clean, responsive, tap to expand & collapse
   ============================================================ */
.notif-wrap{display:flex;flex-direction:column;gap:12px}
.notif-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 2px}
.notif-head h2{font-family:var(--font-display,Georgia,serif);font-size:20px;font-weight:600;margin:0;color:var(--ink-900,#1a241c)}
.notif-head span{font-size:12px;color:var(--ink-500,#5d6b60);font-weight:600}
.notif-list{display:flex;flex-direction:column;gap:8px}
.notif-item{
  background:#fffdf9;border:1px solid rgba(20,31,23,.08);border-radius:14px;overflow:hidden;
  box-shadow:0 2px 6px rgba(20,31,23,.045);transition:box-shadow .13s ease,border-color .13s ease;
}
.notif-item.unread{border-color:rgba(63,107,62,.28);background:linear-gradient(120deg,#f1f6ec,#fffdf9 70%)}
.notif-item.open{box-shadow:0 5px 16px rgba(20,31,23,.1)}
@media(hover:hover){.notif-item:hover{border-color:rgba(20,31,23,.16)}}
.notif-row{
  display:flex;align-items:center;gap:11px;width:100%;text-align:left;cursor:pointer;
  background:none;border:none;padding:12px 13px;
}
.notif-ic{
  flex-shrink:0;width:36px;height:36px;border-radius:11px;display:grid;place-items:center;
  background:var(--cream-100,#f3eee2);color:var(--forest-700,#1d3d24);
}
.notif-ic svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:2}
.notif-ic.hot{background:linear-gradient(150deg,#3f6b3e,#1d3d24);color:#fff}
.notif-text{
  flex:1;min-width:0;font-size:13.5px;font-weight:600;color:var(--ink-800,#2a3a2c);line-height:1.35;
}
.notif-item:not(.open) .notif-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.notif-meta{flex-shrink:0;display:flex;align-items:center;gap:6px}
.notif-meta time{font-size:10.5px;color:var(--ink-400,#9aa090);font-weight:700;white-space:nowrap}
.notif-chev{display:grid;place-items:center;color:#bcc4b6;transform:rotate(-90deg);transition:transform .18s ease}
.notif-chev svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2.2}
.notif-item.open .notif-chev{transform:rotate(90deg);color:var(--forest-600,#2f6b3e)}
.notif-body{padding:0 13px 13px 60px}
.notif-body p{margin:0;font-size:13.5px;line-height:1.5;color:var(--ink-700,#3a4a3c)}
.notif-item.unread .notif-ic::after{
  content:"";position:absolute;
}


/* important notifications */
.notif-item.important{border-color:rgba(176,58,44,.35)!important;background:linear-gradient(120deg,#fdeeea,#fffdf9 70%)!important}
.notif-ic.urgent{background:linear-gradient(150deg,#cc6655,#a8392f)!important;color:#fff!important}
.notif-badge{font-style:normal;font-size:9px;font-weight:900;letter-spacing:.06em;background:#a8392f;color:#fff;padding:2px 6px;border-radius:6px;margin-right:4px;vertical-align:1px}

/* weekly summary modal */
.wsum-head{margin-bottom:14px}
.wsum-hero{display:flex;flex-direction:column;gap:2px;margin-bottom:12px;
  background:linear-gradient(135deg,var(--forest-600,#385c3d),var(--forest-900,#16271a));
  color:#fff;border-radius:16px;padding:16px 18px;box-shadow:0 8px 22px rgba(20,40,22,.2)}
.wsum-name{font-family:var(--font-display,Georgia,serif);font-size:20px;font-weight:600;color:#fff}
.wsum-range{font-size:12.5px;color:rgba(255,255,255,.82);font-weight:600}
.wsum-totals{display:flex;gap:8px}
.wsum-tot{flex:1;background:var(--cream-100,#f3eee2);border-radius:13px;padding:12px 10px;text-align:center;border:1px solid rgba(20,31,23,.06)}
.wsum-tot em{display:block;font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-500,#5d6b60);font-style:normal}
.wsum-tot strong{font-size:19px;font-weight:800;color:var(--ink-900,#1a241c)}
.wsum-tot.hero{background:linear-gradient(150deg,#3f8a52,#2f6b3e);color:#fff;box-shadow:0 5px 14px rgba(47,107,62,.3)}
.wsum-tot.hero em{color:rgba(255,255,255,.82)}
.wsum-tot.hero strong{color:#fff}
.wsum-days{display:flex;flex-direction:column;gap:7px;margin-top:14px}
.wsum-day{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:13px;background:var(--cream-50,#fbf8f1);border:1px solid rgba(20,31,23,.08)}
.wsum-day.has{background:linear-gradient(120deg,#e8f2e6,#fbf8f1 75%);border-color:rgba(63,107,62,.28);box-shadow:0 2px 8px rgba(47,107,62,.08)}
.wsum-day.has .wsum-daycol{background:linear-gradient(160deg,#4a8f5a,#2f6b3e);color:#fff;border-radius:10px;padding:5px 0}
.wsum-day.has .wsum-dow{color:rgba(255,255,255,.82)}
.wsum-day.has .wsum-daycol strong{color:#fff}
.wsum-daycol{flex:0 0 38px;text-align:center;line-height:1.05}
.wsum-dow{display:block;font-size:9.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-500,#5d6b60)}

/* ============================================================
   MOBILE NAV — FULL REDESIGN (authoritative, overrides all above)
   A clean light floating bar with a soft active highlight.
   Everything is reset first, then styled fresh.
   ============================================================ */
@media(max-width:1023px){
  /* remove any old gradient overlay behind the bar */
  body::after{display:none!important;content:none!important}

  .mobile-nav{
    all:unset;
    box-sizing:border-box!important;
    position:fixed!important;
    left:0!important;right:0!important;
    width:100%!important;max-width:100%!important;
    bottom:0!important;
    display:grid!important;
    grid-template-columns:repeat(6,1fr)!important;
    align-items:stretch!important;
    gap:2px!important;
    padding:6px 8px calc(6px + var(--safe-b))!important;
    border-radius:20px 20px 0 0!important;
    background:linear-gradient(180deg,#235235,#163a25)!important;
    border:none!important;border-top:1px solid rgba(255,255,255,.1)!important;
    box-shadow:0 -8px 28px rgba(10,30,16,.32)!important;
    z-index:95!important;
  }

  .mobile-nav .mtab{
    all:unset;
    box-sizing:border-box!important;
    display:flex!important;flex-direction:column!important;
    align-items:center!important;justify-content:center!important;
    gap:2px!important;
    height:52px!important;
    border-radius:15px!important;
    cursor:pointer!important;
    color:rgba(255,255,255,.88)!important;
    transition:color .16s ease, background .16s ease!important;
    -webkit-tap-highlight-color:transparent!important;
  }
  .mobile-nav .mtab > svg{
    width:26px!important;height:26px!important;
    fill:none!important;stroke:currentColor!important;stroke-width:2!important;
    stroke-linecap:round!important;stroke-linejoin:round!important;
  }
  .mobile-nav .mtab > span{
    font-size:11px!important;font-weight:800!important;letter-spacing:.01em!important;
    line-height:1!important;color:currentColor!important;
    white-space:nowrap!important;overflow:visible!important;
    text-shadow:0 1px 2px rgba(0,0,0,.28)!important;
    -webkit-font-smoothing:antialiased!important;
  }
  .mobile-nav .mtab:active{transform:scale(.94)!important}

  /* active tab — bright chip on dark bar */
  .mobile-nav .mtab.active{
    background:linear-gradient(180deg,#5fbf76,#3f9a57)!important;
    color:#ffffff!important;
    box-shadow:0 4px 12px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.3)!important;
  }
  .mobile-nav .mtab.active > svg{stroke-width:2.3!important;color:#fff!important}
  .mobile-nav .mtab.active > span{font-weight:800!important;color:#fff!important}

  /* page padding so content clears the floating bar */
  .content{padding-bottom:calc(86px + var(--safe-b))!important}

  /* keep it hidden while a full-screen chat thread is open */
  body.chat-thread-open .mobile-nav{display:none!important}
}
@media(max-width:380px){
  .mobile-nav{left:0!important;right:0!important;padding:6px 6px calc(6px + var(--safe-b))!important}
  .mobile-nav .mtab{height:50px!important;gap:2px!important}
  .mobile-nav .mtab > svg,.mobile-nav .mtab svg{width:25px!important;height:25px!important}
  .mobile-nav .mtab > span{font-size:10.5px!important;font-weight:800!important;text-shadow:0 1px 2px rgba(0,0,0,.28)!important}
}
