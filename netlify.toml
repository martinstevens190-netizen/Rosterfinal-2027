[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # web-push and blobs use Node built-ins/crypto — keep them external so Netlify
  # installs them normally instead of esbuild trying to inline them.
  external_node_modules = ["web-push", "@netlify/blobs"]

# API + sync routes go to the function, everything else is the SPA
[[redirects]]
  from = "/api/sync"
  to = "/.netlify/functions/sync"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions."booking-reminder-scheduler"]
  schedule = "*/15 * * * *"

[functions."shift-reminder-scheduler"]
  schedule = "*/15 * * * *"
